                                  autoFocus
                                  value={renameValue}
                                  onChange={e => setRenameValue(e.target.value)}
                                  onClick={e => e.stopPropagation()}
                                  onKeyDown={e => {
                                    if (e.key === 'Enter') {
                                      api.renameCase(c.caso_id, renameValue).then(() => { setRenamingId(null); refreshCaseList(); });
                                    } else if (e.key === 'Escape') { setRenamingId(null); }
                                  }}
                                  onBlur={() => {
                                    api.renameCase(c.caso_id, renameValue).then(() => { setRenamingId(null); refreshCaseList(); });
                                  }}
                                  className="flex-1 min-w-0 rounded px-1.5 py-0.5 text-xs font-medium outline-none"
                                  style={{ background:'var(--stone-100)', border:'1px solid var(--accent)', color:'var(--stone-900)' }}
                                />
                              ) : (
                                <span className="text-xs font-medium truncate flex-1"
                                  style={{ color: isActive ? 'var(--accent)' : 'var(--stone-700)' }}>
                                  {displayName}
                                </span>
                              )}
                            </div>
                            {/* ⋯ menu trigger */}
                            {!isRenaming && (
                              <button
                                onClick={e => {
                                  e.stopPropagation();
                                  setCaseMenu(menuOpen ? null : { caso_id: c.caso_id });
                                }}
                                className="opacity-0 group-hover:opacity-100 p-1 rounded transition-all duration-200 flex-shrink-0 ml-1"
                                style={{ color: menuOpen ? 'var(--stone-700)' : 'var(--stone-400)', background: menuOpen ? 'var(--stone-300)' : 'transparent' }}>
                                <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor">
                                  <circle cx="12" cy="5" r="2"/><circle cx="12" cy="12" r="2"/><circle cx="12" cy="19" r="2"/>
                                </svg>
                              </button>
                            )}
                          </div>

                          <div className="flex items-center space-x-2 mt-1 ml-5">
                            <span className="font-mono" style={{ fontSize:8, color:'var(--stone-400)' }}>{c.status || 'novo'}</span>
                            {c.updated_at && (
                              <span className="font-mono" style={{ fontSize:8, color:'var(--stone-400)' }}>
                                {new Date(c.updated_at).toLocaleDateString('pt-BR', { day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit' })}
                              </span>
                            )}
                          </div>
                        </div>

                        {/* Dropdown menu */}
                        {menuOpen && (
                          <div
                            className="absolute z-50 rounded-lg overflow-hidden anim-fade"
                            style={{ right:4, top:'100%', minWidth:168, background:'var(--stone-50)', border:'1px solid var(--stone-300)', boxShadow:'0 8px 24px rgba(0,0,0,0.18)' }}
                            onClick={e => e.stopPropagation()}>
                            {/* Abrir pasta */}
                            <button
                              onClick={() => {
                                api.openFolder(c.caso_id).catch(() => {
                                  // fallback: show path
                                  api.getFolder(c.caso_id).then(r => r?.path && alert('Pasta: ' + r.path));
                                });
                                setCaseMenu(null);
                              }}
                              className="w-full flex items-center space-x-2.5 px-3 py-2 text-xs transition-colors duration-150"
                              style={{ color:'var(--stone-700)' }}
                              onMouseEnter={e => e.currentTarget.style.background='var(--stone-100)'}
                              onMouseLeave={e => e.currentTarget.style.background='transparent'}>
                              <Icon name="folder-open" className="w-3.5 h-3.5 flex-shrink-0" style={{ color:'var(--stone-400)' }} />
                              <span>Abrir pasta</span>
                            </button>
                            {/* Renomear */}
                            <button
                              onClick={() => {
                                setRenamingId(c.caso_id);
                                setRenameValue(displayName);
                                setCaseMenu(null);
                              }}
                              className="w-full flex items-center space-x-2.5 px-3 py-2 text-xs transition-colors duration-150"
                              style={{ color:'var(--stone-700)' }}
                              onMouseEnter={e => e.currentTarget.style.background='var(--stone-100)'}
                              onMouseLeave={e => e.currentTarget.style.background='transparent'}>
                              <Icon name="pencil" className="w-3.5 h-3.5 flex-shrink-0" style={{ color:'var(--stone-400)' }} />
                              <span>Renomear</span>
                            </button>
                            {/* Divider */}
                            <div style={{ height:1, background:'var(--stone-200)', margin:'2px 0' }} />
                            {/* Excluir */}
                            <button
                              onClick={() => {
                                setCaseMenu(null);
                                if (confirm(`Excluir "${displayName}"?\nEsta ação não pode ser desfeita.`)) {
                                  api.deleteCase(c.caso_id).then(() => {
                                    refreshCaseList();
                                    if (c.caso_id === casoId) {
                                      setCasoId(''); setCaseState(null); setEvents([]);
                                      localStorage.removeItem('ratio_escritorio_caso_id');
                                    }
                                  });
                                }
                              }}
                              className="w-full flex items-center space-x-2.5 px-3 py-2 text-xs transition-colors duration-150"
                              style={{ color:'#ef4444' }}
                              onMouseEnter={e => e.currentTarget.style.background='#fef2f2'}
                              onMouseLeave={e => e.currentTarget.style.background='transparent'}>
                              <Icon name="trash-2" className="w-3.5 h-3.5 flex-shrink-0" />
                              <span>Excluir caso</span>
                            </button>
                          </div>
                        )}
                      </div>
                    );
                  })}
                </div>
                <div className="p-3" style={{ borderTop:'1px solid var(--stone-200)' }}>
                  <button onClick={() => startCase('peticao_inicial')}
                    className="w-full py-2 rounded-lg text-xs font-semibold transition-all duration-200"
                    style={{ background:'var(--accent)', color:'var(--stone-50)' }}
                    onMouseEnter={e => e.target.style.filter='brightness(1.12)'} onMouseLeave={e => e.target.style.filter='none'}>
                    + Novo Caso
                  </button>
                </div>
              </div>
            )}
          </div>

          {/* ── MAIN ── */}
          <div className="flex-1 flex flex-col h-full min-w-0">
            <div className="gold-rule" />

            {/* Top bar — matches main app identity */}
            <div className="h-16 flex items-center justify-between px-7 shrink-0" style={{ borderBottom:'1px solid var(--stone-200)', background: theme==='dark' ? 'rgba(20,18,16,0.85)' : 'rgba(250,250,249,0.85)', backdropFilter:'blur(6px)' }}>
              <div className="flex items-center space-x-4">
                <span style={{ margin:0, fontSize:14, fontWeight:600, letterSpacing:'0.08em', textTransform:'uppercase', color:'var(--stone-900)', fontFamily:'"Inter",sans-serif' }}>RATIO</span>
                <span style={{ margin:0, fontSize:14, fontWeight:500, textTransform:'uppercase', letterSpacing:'0.03em', color:'var(--stone-400)', fontFamily:'"Inter",sans-serif' }}>{'\u00A0'}/ ESCRITORIO</span>
                {mode >= 0 && <>
                  <div className="h-4 w-px" style={{ background:'var(--stone-300)' }} />
                  <AgentAvatars activeAgents={activeAgents} completedAgents={completedAgents} onClickAgent={setAgentDetail} />
                </>}
              </div>
              <div className="flex items-center space-x-3">
                {mode >= 0 && caseState && (
                  <>
                    <span className="font-mono px-2 py-1 rounded" style={{ fontSize:9, color:'var(--stone-500)', border:'1px solid var(--stone-300)' }}>
                      {caseState.status}
                    </span>
                    <BurnMeter cost={caseState.custo_total_usd || 0} />
                  </>
                )}
              </div>
            </div>

            {/* Content */}
            <div className="flex-1 overflow-hidden">
              {mode === -1 && (
                <div className="flex items-center justify-center h-full anim-fade">
                  <div className="max-w-lg w-full text-center space-y-8 px-6">
                    <div>
                      <div className="w-16 h-16 rounded-xl mx-auto flex items-center justify-center mb-5"
                        style={{ background:'var(--accent-dim)', border:'1px solid var(--accent)33' }}>
                        <Icon name="briefcase" className="w-7 h-7" style={{ color:'var(--accent)' }} />
                      </div>
                      <h2 style={{ margin:0, fontSize:22, fontWeight:600, letterSpacing:'0.08em', textTransform:'uppercase', color:'var(--stone-900)', fontFamily:'"Inter",sans-serif' }}>RATIO <span style={{ fontWeight:500, color:'var(--stone-400)', letterSpacing:'0.03em' }}>/ ESCRITORIO</span></h2>
                      <p className="mt-2 text-sm" style={{ color:'var(--stone-500)', maxWidth:380, margin:'8px auto 0' }}>
                        Pipeline multi-agente para redação de peças jurídicas com pesquisa automatizada e revisão adversarial.
                      </p>
                    </div>
                    <div className="flex justify-center space-x-4">
                      <button onClick={() => startCase('peticao_inicial')}
                        className="px-6 py-3 rounded-lg font-semibold text-sm transition-all duration-200"
                        style={{ background:'var(--accent)', color:'var(--stone-50)' }}
                        onMouseEnter={e => e.target.style.filter='brightness(1.12)'} onMouseLeave={e => e.target.style.filter='none'}>
                        <Icon name="file-plus" className="w-4 h-4 inline mr-2" style={{ verticalAlign:'-2px' }} />
                        Nova Petição Inicial
                      </button>
                      <button onClick={() => startCase('contestacao')}
                        className="px-6 py-3 rounded-lg font-semibold text-sm transition-all duration-200"
                        style={{ border:'1px solid var(--stone-300)', color:'var(--stone-700)' }}
                        onMouseEnter={e => e.target.style.borderColor='var(--accent)'} onMouseLeave={e => e.target.style.borderColor='var(--stone-300)'}>
                        <Icon name="shield" className="w-4 h-4 inline mr-2" style={{ verticalAlign:'-2px' }} />
                        Nova Contestação
                      </button>
                    </div>
                    <div className="pt-4">
                      <div className="flex items-center justify-center space-x-6 font-mono" style={{ fontSize:10, color:'var(--stone-400)' }}>
                        {AGENTS.map(a => (
                          <div key={a.id} className="flex items-center space-x-1.5">
                            <div className="w-2 h-2 rounded-full" style={{ background:a.color }} />
                            <span>{a.name}</span>
                            {!a.llm && <span style={{ fontSize:7, color:'var(--stone-500)', border:'1px solid var(--stone-300)', borderRadius:3, padding:'0 3px' }}>código</span>}
                          </div>
                        ))}
                      </div>
                    </div>
                  </div>
                </div>
              )}
              {mode === 0 && <IntakeMode casoId={casoId} state={caseState} onStateUpdate={handleStateUpdate} />}
              {mode === 1 && <WorkspaceMode casoId={casoId} state={caseState} events={events} onStateUpdate={handleStateUpdate} />}
              {mode === 2 && <DeliveryMode casoId={casoId} state={caseState} />}
              {agentDetail ? <AgentDetailModal agentId={agentDetail} state={caseState} events={events} onClose={() => setAgentDetail(null)} /> : null}
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
