<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ratio / Escritório</title>
  <link rel="icon" type="image/x-icon" href="/escritorio/assets/favicon.ico" />
  <link rel="icon" type="image/png" sizes="32x32" href="/escritorio/assets/favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="48x48" href="/escritorio/assets/favicon-48x48.png" />
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Merriweather:ital@0;1&display=swap');

    :root {
      --stone-50: #141210; --stone-100: #1c1917; --stone-200: #2e2a27;
      --stone-300: #3a3633; --stone-400: #6b6662; --stone-500: #9a948f;
      --stone-600: #b0aaa5; --stone-700: #c4bfba; --stone-800: #d6d1cc; --stone-900: #e8e5e2;
      --accent: #c4a882; --accent-dim: rgba(196,168,130,0.10);
      --agent-intake: #7c8db5; --agent-pesquisador: #8b7ec7; --agent-redator: #c4a882;
      --agent-contraparte: #c47a6e; --agent-auditor: #7a9e8a; --agent-formatador: #8a9bae;
      --glass: rgba(28,25,23,0.55);
    }
    [data-theme="light"] {
      --stone-50: #fafaf9; --stone-100: #f5f5f4; --stone-200: #e7e5e4;
      --stone-300: #d6d3d1; --stone-400: #a8a29e; --stone-500: #78716c;
      --stone-600: #57534e; --stone-700: #44403c; --stone-800: #292524; --stone-900: #1c1917;
      --glass: rgba(250,250,249,0.7);
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:var(--stone-50);color:var(--stone-900);font-family:'Inter',system-ui,sans-serif;overflow:hidden;height:100vh}
    .font-serif{font-family:'Cormorant Garamond',Georgia,serif}
    .font-mono{font-family:'JetBrains Mono',monospace}
    .font-cite{font-family:'Merriweather',Georgia,serif}
    ::-webkit-scrollbar{width:5px}
    ::-webkit-scrollbar-track{background:transparent}
    ::-webkit-scrollbar-thumb{background:var(--stone-300);border-radius:4px}
    ::-webkit-scrollbar-thumb:hover{background:var(--stone-400)}

    @keyframes fadeIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
    @keyframes slideUp{from{opacity:0;transform:translateY(14px) scale(.98)}to{opacity:1;transform:translateY(0) scale(1)}}
    @keyframes spin-arc{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
    @keyframes pulse-dot{0%,100%{opacity:.25}50%{opacity:1}}
    @keyframes glow{0%,100%{box-shadow:0 0 0 0 transparent}50%{box-shadow:0 0 12px -2px var(--accent)}}
    @keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
    .anim-fade{animation:fadeIn .3s ease-out both}
    .anim-slide{animation:slideUp .35s ease-out both}
    .glow-active{animation:glow 2.2s ease-in-out infinite}

    /* Noise texture overlay */
    .noise::after{content:'';position:fixed;inset:0;pointer-events:none;opacity:.025;
      background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-repeat:repeat;mix-blend-mode:overlay;z-index:9999}

    /* Thin gold accent line at top */
    .gold-rule{height:1px;background:linear-gradient(90deg,transparent 0%,var(--accent) 20%,var(--accent) 80%,transparent 100%);opacity:.4}

    /* Streaming shimmer effect */
    .shimmer{background:linear-gradient(90deg,var(--stone-200) 0%,var(--stone-300) 50%,var(--stone-200) 100%);
      background-size:200% 100%;animation:shimmer 1.8s ease-in-out infinite}
  </style>
</head>
<body class="noise">
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback, Fragment } = React;

    /* ══════════ API CLIENT ══════════ */
    const API = '/api/escritorio';
    const api = {
      _f: async (path, opts = {}) => {
        try {
          const r = await fetch(`${API}${path}`, { headers: { 'Content-Type': 'application/json' }, ...opts });
          if (!r.ok) throw new Error(`${r.status}`);
          return await r.json();
        } catch (e) { console.warn(`[escritorio-api] ${opts.method||'GET'} ${path}:`, e.message); return null; }
      },
      createCase: (id, tipo, area) => api._f('/cases', { method: 'POST', body: JSON.stringify({ caso_id: id, tipo_peca: tipo, area_direito: area }) }),
      listCases: () => api._f('/cases'),
      getCase: (id) => api._f(`/cases/${id}`),
      getPipeline: (id) => api._f(`/cases/${id}/pipeline`),
      getEvents: (id) => api._f(`/cases/${id}/events`),
      sendIntake: (id, msg) => api._f(`/cases/${id}/intake`, { method: 'POST', body: JSON.stringify({ message: msg }) }),
      approveGate: (id, gate, approved = true) => api._f(`/cases/${id}/gates/${gate}`, { method: 'POST', body: JSON.stringify({ approved }) }),
      runPipeline: (id) => api._f(`/cases/${id}/run`, { method: 'POST' }),
      submitDraft: (id, sections) => api._f(`/cases/${id}/draft`, { method: 'POST', body: JSON.stringify({ sections }) }),
      runCritique: (id) => api._f(`/cases/${id}/adversarial/critique`, { method: 'POST' }),
      dismissFindings: (id, ids, reason) => api._f(`/cases/${id}/adversarial/dismiss`, { method: 'POST', body: JSON.stringify({ finding_ids: ids, reason }) }),
      submitRevision: (id, updates, notes, finalize) => api._f(`/cases/${id}/adversarial/revise`, { method: 'POST', body: JSON.stringify({ section_updates: updates, notes, finalize }) }),
    };

    /* ══════════ AGENTS & PHASES ══════════ */
    const AGENTS = [
      { id:'intake',       name:'Clara',      role:'Analista de Triagem (IA)',  color:'var(--agent-intake)',      icon:'message-circle', llm:true },
      { id:'pesquisador',  name:'Theo',       role:'Pesquisador Juridico', color:'var(--agent-pesquisador)', icon:'search',         llm:true },
      { id:'redator',      name:'Helena',     role:'Redatora de Pecas',    color:'var(--agent-redator)',     icon:'pen-tool',       llm:true },
      { id:'contraparte',  name:'Marco',      role:'Adv. Parte Adversa',  color:'var(--agent-contraparte)', icon:'shield-alert',   llm:true },
      { id:'auditor',      name:'Auditor',    role:'Codigo / Checagem',   color:'var(--agent-auditor)',     icon:'check-circle',   llm:false },
      { id:'formatador',   name:'Formatador', role:'Codigo / python-docx',color:'var(--agent-formatador)',  icon:'file-text',      llm:false },
    ];
    const PHASES = [
      { id:'intake',      label:'Intake',      num:'01', agent:'intake',      color:'var(--agent-intake)' },
      { id:'research',    label:'Pesquisa',    num:'02', agent:'pesquisador', color:'var(--agent-pesquisador)' },
      { id:'drafting',    label:'Redação',     num:'03', agent:'redator',     color:'var(--agent-redator)' },
      { id:'adversarial', label:'Revisão',     num:'04', agent:'contraparte', color:'var(--agent-contraparte)' },
      { id:'delivery',    label:'Entrega',     num:'05', agent:'auditor',     color:'var(--agent-auditor)' },
    ];

    /* Map backend status to phase index */
    const STATUS_TO_PHASE = {
      intake: 0, gate1: 0,
      pesquisa: 1, gate2: 1,
      redacao: 2,
      adversarial: 3, revisao_humana: 3,
      verificacao: 4, entrega: 4, finalizado: 4,
    };

    /* ══════════ ICON HELPER ══════════ */
    function Icon({ name, className = "w-5 h-5", style }) {
      const ref = useRef(null);
      useEffect(() => {
        if (ref.current && lucide.icons[name]) {
          ref.current.innerHTML = '';
          const el = lucide.createElement(lucide.icons[name]);
          if (className) el.setAttribute('class', className);
          ref.current.appendChild(el);
        }
      }, [name, className]);
      return <span ref={ref} style={{ display:'inline-flex', alignItems:'center', ...(style||{}) }} />;
    }

    /* ══════════ SHARED COMPONENTS ══════════ */

    const BurnMeter = ({ cost }) => (
      <div className="flex items-center space-x-2 font-mono text-xs rounded-md px-3 py-1.5"
        style={{ border:'1px solid var(--stone-300)', background:'var(--stone-100)' }}>
        <span style={{ color:'var(--stone-500)', fontSize:10 }}>Custo</span>
        <span className="font-medium" style={{ color:'var(--accent)', fontSize:11 }}>US$ {cost.toFixed(4)}</span>
      </div>
    );

    const AgentBadge = ({ agentId, size = 22, active, done }) => {
      const a = AGENTS.find(x => x.id === agentId) || AGENTS[0];
      const r = size * 0.42, circ = 2 * Math.PI * r;
      return (
        <div className="relative" style={{ width:size, height:size }}>
          <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} className="absolute inset-0">
            <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={a.color} strokeWidth="1.2" opacity={done ? 0.5 : 0.15} />
            {active && <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={a.color} strokeWidth="1.8"
              strokeDasharray={`${circ*0.28} ${circ*0.72}`} strokeLinecap="round"
              style={{ animation:'spin-arc 1.2s linear infinite', transformOrigin:'center' }} />}
          </svg>
          {active && <div className="absolute inset-0 rounded-full" style={{ background:a.color, opacity:0.06, animation:'pulse-dot 2s ease-in-out infinite' }} />}
          <div className="absolute inset-0 flex items-center justify-center">
            {done && !active
              ? <svg width={size*0.4} height={size*0.4} viewBox="0 0 8 8"><polyline points="1.5,4 3.5,6 6.5,2" fill="none" stroke={a.color} strokeWidth="1.2" strokeLinecap="round" strokeLinejoin="round"/></svg>
              : <Icon name={a.icon} className={`w-${Math.round(size*0.4/4)} h-${Math.round(size*0.4/4)}`}
                  style={{ color: active ? a.color : done ? a.color+'99' : 'var(--stone-400)', width:size*0.4, height:size*0.4 }} />}
          </div>
        </div>
      );
    };

    const AgentAvatars = ({ activeAgents = [], completedAgents = [], onClickAgent }) => (
      <div className="flex items-center space-x-1">
        {AGENTS.map(a => {
          const isAct = activeAgents.includes(a.id), isDone = completedAgents.includes(a.id);
          const clickable = isDone || isAct;
          return (
            <div key={a.id} title={`${a.name} · ${a.role}${clickable ? ' (clique para ver)' : ''}`}
              onClick={() => clickable && onClickAgent && onClickAgent(a.id)}
              className={`flex items-center space-x-1.5 rounded-full px-2 py-0.5 transition-all duration-300 ${isAct ? 'glow-active' : ''} ${clickable ? 'cursor-pointer' : ''}`}
              style={{ border:`1px solid ${isDone ? a.color+'55' : isAct ? a.color+'88' : 'var(--stone-300)'}`,
                       background: isDone || isAct ? a.color+'0d' : 'transparent' }}>
              <AgentBadge agentId={a.id} size={16} active={isAct} done={isDone} />
              <span className="font-mono" style={{ fontSize:8, color: isAct ? a.color : isDone ? a.color+'88' : 'var(--stone-400)', whiteSpace:'nowrap' }}>{a.name}</span>
            </div>
          );
        })}
      </div>
    );

    /* ── Agent Detail Modal — shows real data from state ── */
    const AgentDetailModal = ({ agentId, state, events, onClose }) => {
      const a = AGENTS.find(x => x.id === agentId);
      if (!a) return null;

      const buildOutput = () => {
        if (!state) return null;
        switch (agentId) {
          case 'intake': return {
            title: 'Dossiê de Triagem',
            items: [
              { label: 'Fatos Estruturados', value: `${(state.fatos_estruturados || []).length}` },
              { label: 'Provas Disponíveis', value: `${(state.provas_disponiveis || []).length}` },
              { label: 'Pontos de Atenção', value: `${(state.pontos_atencao || []).length}` },
              { label: 'Tipo', value: state.tipo_peca === 'peticao_inicial' ? 'Petição Inicial' : 'Contestação' },
              { label: 'Area', value: state.area_direito || '(não definida)' },
            ],
            detail: (state.fatos_estruturados || []).map((f, i) => `(${i+1}) ${f}`).join('\n') || null,
          };
          case 'pesquisador': return {
            title: 'Resultado da Pesquisa',
            items: [
              { label: 'Teses decompostas', value: `${(state.teses || []).length}` },
              { label: 'Jurisprudencia encontrada', value: `${(state.pesquisa_jurisprudencia || []).length} docs` },
              { label: 'Legislacao', value: `${(state.pesquisa_legislacao || []).length} refs` },
            ],
            detail: (state.teses || []).map(t => `${t.descricao} (${t.confianca})`).join('\n') || null,
          };
          case 'redator': return {
            title: 'Peca Redigida',
            items: [
              { label: 'Secoes', value: Object.keys(state.peca_sections || {}).join(', ') || '(nenhuma)' },
              { label: 'Citacoes rastreadas', value: `${Object.keys(state.proveniencia || {}).length}` },
            ],
            detail: null,
          };
          case 'contraparte': {
            const crit = state.critica_atual;
            return {
              title: 'Análise Adversarial',
              items: [
                { label: 'Rodadas', value: `${state.rodada_atual || 0}` },
                { label: 'Score de risco', value: crit ? `${crit.score_de_risco}/100` : '(sem critica)' },
                { label: 'Recomendacao', value: crit ? crit.recomendacao : '-' },
                { label: 'Falhas processuais', value: crit ? `${(crit.falhas_processuais || []).length}` : '0' },
                { label: 'Args materiais fracos', value: crit ? `${(crit.argumentos_materiais_fracos || []).length}` : '0' },
              ],
              detail: crit ? crit.analise_contestacao : null,
            };
          }
          case 'auditor': return {
            title: 'Relatorio de Auditoria',
            items: [
              { label: 'Verificacoes', value: `${(state.verificacoes || []).length}` },
              { label: 'Documento final', value: state.output_docx_path ? 'Gerado' : 'Pendente' },
            ],
            detail: (state.verificacoes || []).map(v => `${v.item || v.check || 'verificacao'}: ${v.result || v.status || 'ok'}`).join('\n') || null,
          };
          case 'formatador': return {
            title: 'Documento Final',
            items: [
              { label: 'Caminho', value: state.output_docx_path || '(nao gerado)' },
              { label: 'Formato', value: '.docx (ABNT/CNJ)' },
            ],
            detail: null,
          };
          default: return null;
        }
      };

      const output = buildOutput();
      const agentEvents = (events || []).filter(e => e.agent === agentId || (e.type_name || '').startsWith(agentId));

      return (
        <div className="fixed inset-0 z-50 flex items-center justify-center anim-fade" style={{ background:'rgba(0,0,0,0.5)', backdropFilter:'blur(6px)' }} onClick={onClose}>
          <div className="w-full max-w-lg max-h-[80vh] flex flex-col rounded-xl anim-slide" style={{ background:'var(--stone-100)', border:`1px solid ${a.color}44`, boxShadow:'0 24px 48px rgba(0,0,0,0.3)' }} onClick={e => e.stopPropagation()}>
            <div className="flex items-center justify-between p-4" style={{ borderBottom:'1px solid var(--stone-200)' }}>
              <div className="flex items-center space-x-3">
                <AgentBadge agentId={agentId} size={28} active={false} done={true} />
                <div>
                  <h3 className="font-serif text-base font-bold" style={{ color: a.color }}>{a.name}</h3>
                  <span className="font-mono" style={{ fontSize:9, color:'var(--stone-500)' }}>{a.role}</span>
                </div>
              </div>
              <button onClick={onClose} className="p-1 rounded transition-colors" style={{ color:'var(--stone-400)' }}>
                <Icon name="x" className="w-4 h-4" />
              </button>
            </div>
            <div className="flex-1 overflow-y-auto p-4 space-y-4">
              {output && <>
                <h4 className="font-serif font-semibold" style={{ fontSize:14, color:'var(--stone-900)' }}>{output.title}</h4>
                <div className="rounded-lg p-3 space-y-0.5" style={{ background:'var(--stone-50)', border:'1px solid var(--stone-200)' }}>
                  {output.items.map((item, i) => (
                    <div key={i} className="flex justify-between py-1.5 font-mono" style={{ fontSize:10, borderBottom: i < output.items.length-1 ? '1px solid var(--stone-200)' : 'none' }}>
                      <span style={{ color:'var(--stone-500)' }}>{item.label}</span>
                      <span className="text-right ml-3" style={{ color:'var(--stone-800)' }}>{item.value}</span>
                    </div>
                  ))}
                </div>
                {output.detail && (
                  <div className="rounded-lg p-3" style={{ background:'var(--stone-50)', border:'1px solid var(--stone-200)' }}>
                    <span className="font-mono" style={{ fontSize:9, color:'var(--stone-500)' }}>Detalhamento</span>
                    <p className="mt-1 text-xs whitespace-pre-line leading-relaxed" style={{ color:'var(--stone-700)' }}>{output.detail}</p>
                  </div>
                )}
              </>}
              {agentEvents.length > 0 && (
                <div>
                  <span className="font-mono" style={{ fontSize:9, color:'var(--stone-500)' }}>Log de atividade</span>
                  <div className="mt-1 space-y-1">
                    {agentEvents.map((ev, i) => (
                      <div key={i} className="flex items-start space-x-2 py-1" style={{ fontSize:10 }}>
                        <span className="font-mono shrink-0" style={{ color: a.color }}>{'\u25CF'}</span>
                        <span style={{ color:'var(--stone-600)' }}>{ev.text || ev.type_name || JSON.stringify(ev.data || {}).slice(0,80)}</span>
                      </div>
                    ))}
                  </div>
                </div>
              )}
            </div>
          </div>
        </div>
      );
    };

    /* ── In-Column Status ── */
    const InColumnFeed = ({ agentId, color, events, active }) => {
      const a = AGENTS.find(x => x.id === agentId) || AGENTS[0];
      const agentEvents = (events || []).filter(e => e.agent === agentId || (e.type_name || '').startsWith(agentId));
      const last = agentEvents.length ? agentEvents[agentEvents.length - 1] : null;
      if (!last && !active) return null;
      return (
        <div className="mx-2 mt-2 rounded-md shrink-0 transition-all duration-300" style={{ background:'var(--stone-100)', border:`1px solid ${color}33`, borderTop:`2px solid ${color}` }}>
          <div className="flex items-center justify-between px-2.5 py-2" style={{ background:color+'08' }}>
            <div className="flex items-center space-x-2 min-w-0">
              <AgentBadge agentId={agentId} size={20} active={active} done={!!last} />
              <div className="flex flex-col min-w-0">
                <span className="font-semibold leading-none" style={{ fontSize:10, color }}>{a.name}</span>
                {last ? (
                  <span className="font-mono leading-none mt-1 truncate" style={{ fontSize:8, color:'var(--stone-600)' }}>
                    {last.text || last.type_name || 'Concluido'}
                  </span>
                ) : active ? (
                  <span className="font-mono leading-none mt-1" style={{ fontSize:8, color:'var(--stone-500)' }}>Processando...</span>
                ) : null}
              </div>
            </div>
            {!active && last && <span className="font-mono shrink-0 ml-1" style={{ fontSize:8, color:'var(--stone-500)' }}>{'\u2713'}</span>}
            {active && <div className="flex items-center space-x-0.5 shrink-0 ml-1">
              {[0,0.25,0.5].map(d => <div key={d} className="w-1 h-1 rounded-full" style={{ background:color, animation:`pulse-dot 1.4s ease-in-out infinite`, animationDelay:`${d}s` }} />)}
            </div>}
          </div>
        </div>
      );
    };

    /* ══════════ GATE OVERLAY ══════════ */
    const GateOverlay = ({ gateName, gateLabel, gateDesc, data, onApprove, onReject }) => (
      <div className="fixed inset-0 z-50 flex items-center justify-center anim-fade" style={{ background:'rgba(0,0,0,0.5)', backdropFilter:'blur(6px)' }}>
        <div className="w-full max-w-md rounded-xl p-6 space-y-4 anim-slide" style={{ background:'var(--stone-100)', border:'1px solid var(--stone-300)', boxShadow:'0 24px 48px rgba(0,0,0,0.3)' }}>
          <div className="flex items-center space-x-3">
            <div className="w-9 h-9 rounded-lg flex items-center justify-center" style={{ background:'var(--accent-dim)', border:'1px solid var(--accent)44' }}>
              <Icon name="shield-check" className="w-4 h-4" style={{ color:'var(--accent)' }} />
            </div>
            <div>
              <h3 className="font-serif text-lg font-bold" style={{ color:'var(--stone-900)' }}>{gateLabel}</h3>
              <p className="font-mono" style={{ fontSize:10, color:'var(--stone-500)' }}>{gateDesc}</p>
            </div>
          </div>
          <div className="space-y-0.5 text-xs rounded-lg p-3" style={{ background:'var(--stone-50)', border:'1px solid var(--stone-200)' }}>
            {data.map((item, i) => (
              <div key={i} className="flex justify-between py-2" style={{ borderBottom: i<data.length-1 ? '1px solid var(--stone-200)' : 'none' }}>
                <span style={{ color:'var(--stone-500)' }}>{item.label}</span>
                <span className="font-medium" style={{ color:'var(--stone-800)' }}>{item.value}</span>
              </div>
            ))}
          </div>
          <div className="flex space-x-3 pt-1">
            <button onClick={onReject} className="flex-1 py-2.5 text-xs font-medium rounded-lg transition-colors duration-200"
              style={{ border:'1px solid var(--stone-300)', color:'var(--stone-500)' }}
              onMouseEnter={e => e.target.style.borderColor='var(--stone-400)'} onMouseLeave={e => e.target.style.borderColor='var(--stone-300)'}>
              &#8592; Voltar
            </button>
            <button onClick={onApprove} className="flex-1 py-2.5 text-xs font-semibold rounded-lg transition-all duration-200"
              style={{ background:'var(--accent)', color:'var(--stone-50)' }}
              onMouseEnter={e => e.target.style.filter='brightness(1.1)'} onMouseLeave={e => e.target.style.filter='none'}>
              Aprovar &#8594;
            </button>
          </div>
        </div>
      </div>
    );

    /* ══════════ INTAKE MODE ══════════ */
    const IntakeMode = ({ casoId, state, onStateUpdate }) => {
      const [msgs, setMsgs] = useState([]);
      const [input, setInput] = useState('');
      const [loading, setLoading] = useState(false);
      const [analyzing, setAnalyzing] = useState(false);
      const [showGate, setShowGate] = useState(false);
      const btm = useRef(null);

      /* Sync messages from backend state */
      useEffect(() => {
        if (state && state.intake_history && state.intake_history.length > 0) {
          setMsgs(state.intake_history);
        } else if (msgs.length === 0) {
          setMsgs([{ role:'assistant', content:'Olá! Descreva os fatos do caso, as partes envolvidas e os documentos disponíveis. Quanto mais detalhado, melhor o resultado.\n\nQuando terminar, clique em "Analisar com Clara" para que eu estruture o dossiê.' }]);
        }
      }, [state?.intake_history?.length]);

      useEffect(() => { btm.current?.scrollIntoView({ behavior:'smooth' }); }, [msgs.length]);

      const send = async () => {
        const txt = input.trim();
        if (!txt || loading || analyzing) return;
        setMsgs(p => [...p, { role:'user', content: txt }]);
        setInput('');
        setLoading(true);
        const resp = await api.sendIntake(casoId, txt);
        if (resp && resp.state) {
          onStateUpdate(resp.state);
          if (resp.state.intake_history && resp.state.intake_history.length > 0) {
            setMsgs(resp.state.intake_history);
          }
        }
        setLoading(false);
      };

      const handleAnalyze = async () => {
        setAnalyzing(true);
        setMsgs(p => [...p, { role:'assistant', content:'Analisando os fatos com a Clara… Aguarde.' }]);
        try {
          const resp = await api.runPipeline(casoId);
          if (resp && resp.state) {
            onStateUpdate(resp.state);
          }
        } catch (err) {
          setMsgs(p => [...p, { role:'assistant', content:'Erro ao analisar: ' + (err.message || 'falha na conexão') }]);
        }
        setAnalyzing(false);
      };

      const handleGateApprove = async () => {
        const resp = await api.approveGate(casoId, 'gate1', true);
        if (resp && resp.state) {
          onStateUpdate(resp.state);
        }
        setShowGate(false);
      };

      const handleGateReject = async () => {
        await api.approveGate(casoId, 'gate1', false);
        setShowGate(false);
      };

      const fatos = state?.fatos_estruturados || [];
      const provas = state?.provas_disponiveis || [];
      const pontos = state?.pontos_atencao || [];
      const hasAnalysis = fatos.length > 0;
      const hasMessages = state?.intake_history?.length > 0;

      const gateData = state ? [
        { label: 'Fatos Estruturados', value: `${fatos.length}` },
        { label: 'Provas Disponíveis', value: `${provas.length}` },
        { label: 'Pontos de Atenção', value: `${pontos.length}` },
        { label: 'Tipo da Peça', value: state.tipo_peca === 'peticao_inicial' ? 'Petição Inicial' : 'Contestação' },
        { label: 'Area', value: state.area_direito || '(não definida)' },
      ] : [];

      return (
        <>
          <div className="flex flex-col h-full max-w-2xl mx-auto w-full pt-8 pb-4 px-5">
            <div className="text-center mb-6 anim-fade">
              <h2 className="font-serif text-2xl font-bold" style={{ color:'var(--stone-900)' }}>Triagem do Caso</h2>
              <p className="mt-1" style={{ fontSize:12, color:'var(--stone-500)' }}>Descreva os fatos e clique em "Analisar com Clara" para estruturar o dossiê</p>
            </div>
            <div className="flex-1 overflow-y-auto space-y-3 mb-4 pr-1">
              {msgs.map((m, i) => (
                <div key={i} className={`flex ${m.role==='user'?'justify-end':'justify-start'} anim-fade`} style={{ animationDelay:`${i*0.05}s` }}>
                  <div className="max-w-[85%] rounded-lg px-4 py-3" style={{
                    background: m.role==='user' ? 'var(--stone-200)' : 'var(--stone-100)',
                    border: m.role==='user' ? 'none' : '1px solid var(--stone-200)',
                    borderLeft: m.role==='assistant' ? '2px solid var(--agent-intake)' : 'none',
                  }}>
                    <p className="text-sm whitespace-pre-wrap leading-relaxed" style={{ color: m.role==='user' ? 'var(--stone-900)' : 'var(--stone-700)' }}>{m.content}</p>
                  </div>
                </div>
              ))}
              {(loading || analyzing) && <div className="flex justify-start"><div className="rounded-lg px-4 py-3 shimmer" style={{ width: analyzing ? 260 : 180, height:40, borderLeft:'2px solid var(--agent-intake)' }} /></div>}

              {/* Clara's analysis results */}
              {hasAnalysis && (
                <div className="rounded-lg p-4 anim-fade" style={{ background:'var(--stone-50)', border:'1px solid var(--stone-200)', borderLeft:'3px solid var(--agent-intake)' }}>
                  <p className="text-xs font-semibold mb-3" style={{ color:'var(--agent-intake)' }}>Análise da Clara</p>
                  {fatos.length > 0 && (
                    <div className="mb-3">
                      <p className="text-xs font-semibold mb-1" style={{ color:'var(--stone-600)' }}>Fatos Estruturados ({fatos.length})</p>
                      <ul className="space-y-1">{fatos.map((f, i) => <li key={i} className="text-xs pl-3" style={{ color:'var(--stone-700)', borderLeft:'2px solid var(--stone-300)' }}>{typeof f === 'string' ? f : JSON.stringify(f)}</li>)}</ul>
                    </div>
                  )}
                  {provas.length > 0 && (
                    <div className="mb-3">
                      <p className="text-xs font-semibold mb-1" style={{ color:'var(--stone-600)' }}>Provas Disponiveis ({provas.length})</p>
                      <ul className="space-y-1">{provas.map((p, i) => <li key={i} className="text-xs pl-3" style={{ color:'var(--stone-700)', borderLeft:'2px solid var(--stone-300)' }}>{typeof p === 'string' ? p : JSON.stringify(p)}</li>)}</ul>
                    </div>
                  )}
                  {pontos.length > 0 && (
                    <div>
                      <p className="text-xs font-semibold mb-1" style={{ color:'var(--stone-600)' }}>Pontos de Atencao ({pontos.length})</p>
                      <ul className="space-y-1">{pontos.map((pt, i) => <li key={i} className="text-xs pl-3" style={{ color:'var(--amber-600, #d97706)', borderLeft:'2px solid var(--amber-400, #fbbf24)' }}>{typeof pt === 'string' ? pt : JSON.stringify(pt)}</li>)}</ul>
                    </div>
                  )}
                </div>
              )}
              <div ref={btm} />
            </div>

            {/* Action buttons */}
            <div className="space-y-2 mb-2">
              {hasMessages && !hasAnalysis && !analyzing && (
                <div className="flex justify-center anim-fade">
                  <button onClick={handleAnalyze} disabled={analyzing} className="px-6 py-2.5 text-xs font-semibold rounded-lg transition-all duration-200 flex items-center gap-2"
                    style={{ background:'var(--agent-intake)', color:'white' }}
                    onMouseEnter={e => e.target.style.filter='brightness(1.15)'} onMouseLeave={e => e.target.style.filter='none'}>
                    <Icon name="sparkles" className="w-3.5 h-3.5" /> Analisar com Clara
                  </button>
                </div>
              )}
              {hasAnalysis && !showGate && (
                <div className="flex justify-center gap-3 anim-fade">
                  <button onClick={handleAnalyze} disabled={analyzing} className="px-4 py-2 text-xs font-medium rounded-lg transition-all duration-200"
                    style={{ background:'var(--stone-200)', color:'var(--stone-700)' }}
                    onMouseEnter={e => e.target.style.filter='brightness(0.95)'} onMouseLeave={e => e.target.style.filter='none'}>
                    Reanalisar
                  </button>
                  <button onClick={() => setShowGate(true)} className="px-6 py-2 text-xs font-semibold rounded-lg transition-all duration-200"
                    style={{ background:'var(--agent-intake)', color:'white' }}
                    onMouseEnter={e => e.target.style.filter='brightness(1.15)'} onMouseLeave={e => e.target.style.filter='none'}>
                    Confirmar Triagem &#8594;
                  </button>
                </div>
              )}
            </div>

            <div className="flex items-end rounded-lg p-2 transition-colors duration-200" style={{ background:'var(--stone-100)', border:'1px solid var(--stone-200)' }}>
              <textarea value={input} onChange={e => setInput(e.target.value)}
                onKeyDown={e => { if (e.key==='Enter' && !e.shiftKey) { e.preventDefault(); send(); } }}
                placeholder="Descreva os fatos do caso..." rows={2}
                className="flex-1 bg-transparent border-none outline-none resize-none px-2 text-sm" style={{ color:'var(--stone-900)' }} />
              <button onClick={send} disabled={loading || analyzing} className="p-2 rounded transition-opacity" style={{ color:'var(--agent-intake)', opacity: (loading||analyzing)?0.4:1 }}>
                <Icon name="send" className="w-4 h-4" />
              </button>
            </div>
          </div>
          {showGate && <GateOverlay
            gateName="gate1"
            gateLabel="Confirmação da Triagem"
            gateDesc="Os fatos e o dossiê estruturado pela Clara estão completos?"
            data={gateData}
            onApprove={handleGateApprove}
            onReject={handleGateReject}
          />}
        </>
      );
    };

    /* ══════════ WORKSPACE MODE ══════════ */
    const WorkspaceMode = ({ casoId, state, events, onStateUpdate }) => {
      const [editSec, setEditSec] = useState(null);
      const [editContent, setEditContent] = useState('');
      const [showGate2, setShowGate2] = useState(false);
      const [running, setRunning] = useState(false);

      const currentPhase = STATUS_TO_PHASE[state?.status] ?? 1;
      const sections = state?.peca_sections || {};
      const teses = state?.teses || [];
      const critica = state?.critica_atual;
      const rodadas = state?.rodadas || [];
      const verificacoes = state?.verificacoes || [];

      /* Derive all falhas from critica_atual */
      const allFalhas = critica ? [
        ...(critica.falhas_processuais || []),
        ...(critica.argumentos_materiais_fracos || []),
      ] : [];

      const handleRun = async () => {
        setRunning(true);
        const resp = await api.runPipeline(casoId);
        if (resp && resp.state) {
          onStateUpdate(resp.state);
        }
        setRunning(false);
      };

      const handleGate2Approve = async () => {
        const resp = await api.approveGate(casoId, 'gate2', true);
        if (resp && resp.state) {
          onStateUpdate(resp.state);
        }
        setShowGate2(false);
      };

      const handleGate2Reject = async () => {
        await api.approveGate(casoId, 'gate2', false);
        setShowGate2(false);
      };

      const handleSaveSection = async () => {
        if (!editSec) return;
        const updated = { ...sections, [editSec]: editContent };
        const resp = await api.submitDraft(casoId, updated);
        if (resp && resp.state) onStateUpdate(resp.state);
        setEditSec(null);
      };

      const handleDismissFinding = async (findingId) => {
        const resp = await api.dismissFindings(casoId, [findingId], 'Descartado pelo usuario');
        if (resp && resp.state) onStateUpdate(resp.state);
      };

      const handleFinalize = async () => {
        const resp = await api.submitRevision(casoId, {}, '', true);
        if (resp && resp.state) onStateUpdate(resp.state);
      };

      const phaseAgentMap = { 0:'intake', 1:'pesquisador', 2:'redator', 3:'contraparte', 4:'auditor' };

      /* Build cards from real state */
      const buildCards = (phaseIdx) => {
        switch (phaseIdx) {
          case 0: /* Intake summary */
            if ((state?.fatos_estruturados || []).length === 0) return [];
            return [{ title: `${(state.fatos_estruturados || []).length} fatos estruturados`, sub: (state.fatos_estruturados || []).slice(0,2).join('; '), color:'var(--agent-intake)' }];
          case 1: /* Research */
            return teses.map(t => ({
              title: t.descricao,
              sub: `${(t.jurisprudencia_favoravel || []).length} favoraveis, ${(t.jurisprudencia_contraria || []).length} contrarios | ${t.confianca}`,
              color: 'var(--agent-pesquisador)',
              tese: t,
            }));
          case 2: /* Drafting */
            return Object.entries(sections).map(([key, content]) => ({
              title: key,
              sub: (content || '').slice(0, 80) + (content && content.length > 80 ? '...' : ''),
              color: 'var(--agent-redator)',
              sectionKey: key,
              onClick: () => { setEditSec(key); setEditContent(content); },
            }));
          case 3: /* Adversarial */
            return allFalhas.map(f => ({
              title: `[${f.gravidade}] ${f.descricao.slice(0,55)}${f.descricao.length>55?'...':''}`,
              sub: f.argumento_contrario ? f.argumento_contrario.slice(0,65) : f.secao_afetada,
              color: 'var(--agent-contraparte)',
              finding: f,
            }));
          case 4: /* Delivery */
            return verificacoes.map(v => ({
              title: v.item || v.check || 'Verificação',
              sub: v.result || v.status || 'ok',
              color: 'var(--agent-auditor)',
            }));
          default: return [];
        }
      };

      const gate2Data = [
        { label: 'Teses decompostas', value: `${teses.length}` },
        { label: 'Jurisprudencia', value: `${(state?.pesquisa_jurisprudencia || []).length} docs` },
        { label: 'Legislacao', value: `${(state?.pesquisa_legislacao || []).length} refs` },
      ];

      /* Show gate2 when backend status is gate2 */
      const needsGate2 = state?.status === 'gate2';

      return (
        <div className="flex h-full w-full">
          <div className="flex flex-1 min-w-0">
            {PHASES.map((ph, i) => {
              const active = i === currentPhase;
              const past = i < currentPhase;
              const cards = buildCards(i);
              const [expandedTese, setExpandedTese] = useState(null);
              return (
                <div key={ph.id} className="flex-1 flex flex-col min-w-0 transition-all duration-300"
                  style={{ borderRight:'1px solid var(--stone-200)', opacity: !past && !active ? 0.2 : 1 }}>
                  {/* Column header */}
                  <div className="p-3 shrink-0" style={{ borderBottom:'1px solid var(--stone-200)', background:'var(--stone-100)' }}>
                    <div className="flex items-center justify-between">
                      <div className="flex items-center space-x-2">
                        <span className="font-mono font-bold" style={{ fontSize:10, color:ph.color }}>{ph.num}</span>
                        <span className="text-xs font-semibold" style={{ color: active ? ph.color : past ? 'var(--stone-700)' : 'var(--stone-500)' }}>{ph.label}</span>
                      </div>
                      {cards.length > 0 && <span className="font-mono" style={{ fontSize:9, color:'var(--stone-400)' }}>{cards.length}</span>}
                    </div>
                    {active && <div className="h-0.5 mt-2 rounded-full transition-all duration-500" style={{ background:ph.color }} />}
                  </div>

                  {/* Agent feed */}
                  <InColumnFeed agentId={phaseAgentMap[i]} color={ph.color} events={events} active={active && running} />

                  {/* Cards */}
                  <div className="flex-1 p-2 overflow-y-auto space-y-2">
                    {cards.map((c, ci) => (
                      <div key={ci} onClick={c.onClick || (c.tese ? () => setExpandedTese(expandedTese === c.tese.id ? null : c.tese.id) : undefined)}
                        className={`p-3 rounded-lg transition-all duration-200 ${c.onClick || c.tese ? 'cursor-pointer' : ''}`}
                        style={{ background:'var(--stone-200)', border:'1px solid var(--stone-300)', borderLeft:`3px solid ${c.color}` }}
                        onMouseEnter={e => e.currentTarget.style.transform='translateY(-1px)'} onMouseLeave={e => e.currentTarget.style.transform='none'}>
                        <h4 className="text-xs font-semibold mb-1" style={{ color:'var(--stone-900)' }}>{c.title}</h4>
                        <p className="leading-relaxed line-clamp-2" style={{ fontSize:10, color:'var(--stone-500)' }}>{c.sub}</p>
                        {/* Expanded tese details */}
                        {c.tese && expandedTese === c.tese.id && (
                          <div className="mt-2.5 pt-2 space-y-1.5" style={{ borderTop:'1px solid var(--stone-300)' }}>
                            {(c.tese.jurisprudencia_favoravel || []).map((d, di) => (
                              <div key={di} className="p-2 rounded" style={{ background:'var(--stone-100)', border:'1px solid var(--stone-200)' }}>
                                <span className="font-mono font-medium" style={{ fontSize:9, color:'var(--agent-pesquisador)' }}>{d.processo || d.process || 'doc'} {d.tribunal ? `· ${d.tribunal}` : ''}</span>
                                <p className="font-cite italic mt-0.5" style={{ fontSize:10, color:'var(--stone-500)' }}>{d.ementa || d.summary || ''}</p>
                              </div>
                            ))}
                            {(c.tese.legislacao || []).map((l, li) => (
                              <div key={`l${li}`} className="p-2 rounded" style={{ background:'var(--stone-100)', border:'1px solid var(--stone-200)' }}>
                                <span className="font-mono font-medium" style={{ fontSize:9, color:'var(--agent-auditor)' }}>{l.artigo || l.ref || JSON.stringify(l).slice(0,60)}</span>
                              </div>
                            ))}
                          </div>
                        )}
                        {/* Dismiss button for adversarial findings */}
                        {c.finding && (
                          <button onClick={(e) => { e.stopPropagation(); handleDismissFinding(c.finding.finding_id); }}
                            className="mt-2 px-2 py-1 text-xs rounded transition-colors"
                            style={{ border:'1px solid var(--stone-300)', color:'var(--stone-500)', fontSize:9 }}>
                            Descartar
                          </button>
                        )}
                      </div>
                    ))}

                    {/* Adversarial round controls */}
                    {i === 3 && currentPhase >= 3 && critica && (
                      <div className="mt-1 p-3 rounded-lg" style={{ background:'var(--stone-100)', border:'1px dashed var(--agent-contraparte)55' }}>
                        <div className="flex justify-between items-center mb-2.5">
                          <span className="font-mono font-bold" style={{ fontSize:10, color:'var(--agent-contraparte)' }}>Rodada {state.rodada_atual}</span>
                          <span className="font-mono font-medium" style={{ fontSize:10, color: critica.score_de_risco > 25 ? 'var(--agent-contraparte)' : 'var(--agent-auditor)' }}>
                            Score: {critica.score_de_risco}/100
                          </span>
                        </div>
                        <div className="w-full h-1.5 rounded-full mb-3" style={{ background:'var(--stone-200)' }}>
                          <div className="h-full rounded-full transition-all duration-700" style={{ width:`${critica.score_de_risco}%`, background: critica.score_de_risco > 25 ? 'var(--agent-contraparte)' : 'var(--agent-auditor)' }} />
                        </div>
                        <div className="font-mono mb-2" style={{ fontSize:9, color:'var(--stone-500)' }}>
                          Recomendacao: <strong style={{ color:'var(--stone-700)' }}>{critica.recomendacao}</strong>
                        </div>
                        <div className="flex space-x-2">
                          <button onClick={handleRun} disabled={running} className="flex-1 py-1.5 font-semibold rounded transition-all duration-200"
                            style={{ fontSize:10, border:'1px solid var(--agent-contraparte)55', color:'var(--agent-contraparte)', opacity: running ? 0.5 : 1 }}>
                            {running ? 'Executando...' : '+ Rodada'}
                          </button>
                          <button onClick={handleFinalize} className="flex-1 py-1.5 font-semibold rounded transition-all duration-200"
                            style={{ fontSize:10, background:'var(--agent-auditor)', color:'white' }}>Finalizar</button>
                        </div>
                      </div>
                    )}

                    {cards.length === 0 && i > currentPhase && (
                      <div className="flex items-center justify-center h-16 font-mono" style={{ fontSize:10, color:'var(--stone-400)' }}>Aguardando...</div>
                    )}
                  </div>

                  {/* Run pipeline button for active phase */}
                  {active && !needsGate2 && state?.status !== 'adversarial' && state?.status !== 'revisao_humana' && (
                    <div className="p-2" style={{ borderTop:'1px solid var(--stone-200)' }}>
                      <button onClick={handleRun} disabled={running}
                        className="w-full py-2 font-semibold rounded-lg flex items-center justify-center transition-all duration-200"
                        style={{ fontSize:10, background: running ? 'var(--stone-300)' : ph.color, color:'white' }}
                        onMouseEnter={e => { if(!running) e.target.style.filter='brightness(1.12)'; }} onMouseLeave={e => e.target.style.filter='none'}>
                        {running ? <><div className="w-3 h-3 border border-white border-t-transparent rounded-full mr-2" style={{ animation:'spin-arc 0.8s linear infinite' }} /> Executando...</> : <>Executar Pipeline <Icon name="arrow-right" className="w-3 h-3 ml-1" /></>}
                      </button>
                    </div>
                  )}

                  {/* Gate2 trigger */}
                  {active && needsGate2 && (
                    <div className="p-2" style={{ borderTop:'1px solid var(--stone-200)' }}>
                      <button onClick={() => setShowGate2(true)}
                        className="w-full py-2 font-semibold rounded-lg flex items-center justify-center transition-all duration-200"
                        style={{ fontSize:10, background: ph.color, color:'white' }}>
                        Confirmar Pesquisa &#8594;
                      </button>
                    </div>
                  )}
                </div>
              );
            })}
          </div>

          {/* Editor modal */}
          {editSec && (
            <div className="fixed inset-0 z-50 flex items-center justify-center anim-fade" style={{ background:'rgba(0,0,0,0.5)', backdropFilter:'blur(6px)' }}>
              <div className="w-full max-w-2xl max-h-[80vh] flex flex-col rounded-xl anim-slide" style={{ background:'var(--stone-100)', border:'1px solid var(--stone-300)', boxShadow:'0 24px 48px rgba(0,0,0,0.3)' }}>
                <div className="flex items-center justify-between p-4" style={{ borderBottom:'1px solid var(--stone-200)' }}>
                  <h3 className="font-serif text-lg font-bold" style={{ color:'var(--stone-900)' }}>{editSec}</h3>
                  <div className="flex items-center space-x-2">
                    <button onClick={handleSaveSection} className="px-4 py-1.5 text-xs font-semibold rounded-lg transition-all duration-200"
                      style={{ background:'var(--accent)', color:'var(--stone-50)' }}>Salvar</button>
                    <button onClick={() => setEditSec(null)} style={{ color:'var(--stone-400)' }}><Icon name="x" className="w-4 h-4" /></button>
                  </div>
                </div>
                <textarea className="flex-1 p-5 bg-transparent border-none outline-none resize-none text-sm leading-relaxed"
                  style={{ color:'var(--stone-800)' }} value={editContent} onChange={e => setEditContent(e.target.value)} />
              </div>
            </div>
          )}

          {showGate2 && <GateOverlay
            gateName="gate2"
            gateLabel="Confirmação da Pesquisa"
            gateDesc="Base de pesquisa suficiente para redigir?"
            data={gate2Data}
            onApprove={handleGate2Approve}
            onReject={handleGate2Reject}
          />}
        </div>
      );
    };

    /* ══════════ DELIVERY MODE ══════════ */
    const DeliveryMode = ({ casoId, state }) => {
      const verificacoes = state?.verificacoes || [];
      const critica = state?.critica_atual;
      const checks = [
        { l: 'Verificacoes', v: `${verificacoes.length} itens`, c: 'var(--agent-auditor)' },
        { l: 'Adversarial', v: `${state?.rodada_atual || 0} rodadas${critica ? `, score ${critica.score_de_risco}/100` : ''}`, c: 'var(--agent-contraparte)' },
        { l: 'Custo total', v: `US$ ${(state?.custo_total_usd || 0).toFixed(4)}`, c: 'var(--accent)' },
        { l: 'Documento', v: state?.output_docx_path ? 'Gerado' : 'Pendente', c: state?.output_docx_path ? 'var(--agent-auditor)' : 'var(--stone-500)' },
      ];

      const handleDownload = () => {
        if (state?.output_docx_path) {
          window.open(`/api/escritorio/cases/${casoId}/download`, '_blank');
        }
      };

      return (
        <div className="flex items-center justify-center h-full p-8 anim-fade">
          <div className="max-w-md w-full rounded-xl p-8 text-center space-y-5 anim-slide" style={{ background:'var(--stone-100)', border:'1px solid var(--stone-300)', boxShadow:'0 16px 40px rgba(0,0,0,0.15)' }}>
            <div className="w-16 h-16 rounded-full mx-auto flex items-center justify-center" style={{ background:'var(--agent-auditor)18', border:'2px solid var(--agent-auditor)' }}>
              <Icon name="check-circle" className="w-8 h-8" style={{ color:'var(--agent-auditor)' }} />
            </div>
            <div>
              <h2 className="font-serif text-2xl font-bold" style={{ color:'var(--stone-900)' }}>Pipeline Concluido</h2>
              <p className="font-cite italic text-sm mt-1" style={{ color:'var(--stone-500)' }}>
                {state?.output_docx_path ? 'Documento pronto para protocolo!' : 'Verificação em andamento...'}
              </p>
            </div>
            <div className="text-left font-mono space-y-0.5 p-4 rounded-lg" style={{ fontSize:10, background:'var(--stone-50)', border:'1px solid var(--stone-200)' }}>
              {checks.map((x, i) => (
                <div key={i} className="flex justify-between py-2" style={{ borderBottom: i<checks.length-1 ? '1px solid var(--stone-200)' : 'none' }}>
                  <span style={{ color:'var(--stone-500)' }}>{x.l}</span>
                  <span className="font-medium" style={{ color:x.c }}>{x.v}</span>
                </div>
              ))}
            </div>
            {/* Verification details */}
            {verificacoes.length > 0 && (
              <div className="text-left p-3 rounded-lg space-y-1" style={{ background:'var(--stone-50)', border:'1px solid var(--stone-200)' }}>
                <span className="font-mono" style={{ fontSize:9, color:'var(--stone-500)' }}>Detalhamento das verificacoes</span>
                {verificacoes.map((v, i) => (
                  <div key={i} className="flex justify-between py-1 font-mono" style={{ fontSize:9, borderBottom: i<verificacoes.length-1 ? '1px solid var(--stone-200)' : 'none' }}>
                    <span style={{ color:'var(--stone-600)' }}>{v.item || v.check || `Item ${i+1}`}</span>
                    <span style={{ color: (v.result||'').includes('ok') || (v.status||'').includes('pass') ? 'var(--agent-auditor)' : 'var(--stone-700)' }}>
                      {v.result || v.status || '-'}
                    </span>
                  </div>
                ))}
              </div>
            )}
            <div className="space-y-2 pt-2">
              <button onClick={handleDownload} disabled={!state?.output_docx_path}
                className="w-full py-2.5 text-xs font-semibold rounded-lg flex items-center justify-center transition-all duration-200"
                style={{ background: state?.output_docx_path ? 'var(--agent-auditor)' : 'var(--stone-300)', color:'white' }}
                onMouseEnter={e => { if(state?.output_docx_path) e.target.style.filter='brightness(1.15)'; }} onMouseLeave={e => e.target.style.filter='none'}>
                <Icon name="download" className="w-4 h-4 mr-2" /> Baixar Peca (.docx)
              </button>
            </div>
          </div>
        </div>
      );
    };

    /* ══════════ MAIN APP ══════════ */
    function App() {
      const [theme, setTheme] = useState('dark');
      const [casoId, setCasoId] = useState('');
      const [caseState, setCaseState] = useState(null); // RatioEscritorioState from backend
      const [events, setEvents] = useState([]);
      const [agentDetail, setAgentDetail] = useState(null);

      const toggleTheme = () => {
        const next = theme === 'dark' ? 'light' : 'dark';
        setTheme(next);
        document.documentElement.setAttribute('data-theme', next);
      };

      /* Derive UI mode from backend status */
      const getMode = () => {
        if (!caseState) return -1; // welcome
        const s = caseState.status;
        if (s === 'intake' || s === 'gate1') return 0; // intake
        if (s === 'entrega' || s === 'finalizado') return 2; // delivery
        return 1; // workspace (pesquisa, gate2, redacao, adversarial, revisao_humana, verificacao)
      };
      const mode = getMode();

      /* Derive active/completed agents from status */
      const deriveAgents = () => {
        if (!caseState) return { active: [], completed: [] };
        const s = caseState.status;
        const completed = [];
        const active = [];

        // Intake done if past intake
        if (['pesquisa','gate2','redacao','adversarial','revisao_humana','verificacao','entrega','finalizado'].includes(s)) completed.push('intake');
        else if (s === 'intake') active.push('intake');

        // Pesquisador done if past pesquisa
        if (['redacao','adversarial','revisao_humana','verificacao','entrega','finalizado'].includes(s)) completed.push('pesquisador');
        else if (['pesquisa','gate2'].includes(s)) active.push('pesquisador');

        // Redator done if past redacao
        if (['adversarial','revisao_humana','verificacao','entrega','finalizado'].includes(s)) completed.push('redator');
        else if (s === 'redacao') active.push('redator');

        // Contraparte done if past adversarial
        if (['verificacao','entrega','finalizado'].includes(s)) completed.push('contraparte');
        else if (['adversarial','revisao_humana'].includes(s)) active.push('contraparte');

        // Auditor + Formatador done if entrega/finalizado
        if (['entrega','finalizado'].includes(s)) { completed.push('auditor'); completed.push('formatador'); }
        else if (s === 'verificacao') { active.push('auditor'); active.push('formatador'); }

        return { active, completed };
      };
      const { active: activeAgents, completed: completedAgents } = deriveAgents();

      const startCase = async (tipo) => {
        const id = `caso_${Date.now()}`;
        setCasoId(id);
        const resp = await api.createCase(id, tipo, '');
        if (resp) {
          // createCase returns the case summary, fetch full state
          const full = await api.getCase(id);
          if (full && full.state) setCaseState(full.state);
        }
      };

      const handleStateUpdate = (newState) => {
        setCaseState(newState);
      };

      /* Poll backend state and events periodically */
      useEffect(() => {
        if (!casoId || mode === -1) return;
        const iv = setInterval(async () => {
          const [caseResp, evtResp] = await Promise.all([
            api.getCase(casoId),
            api.getEvents(casoId),
          ]);
          if (caseResp && caseResp.state) setCaseState(caseResp.state);
          if (evtResp && evtResp.events) setEvents(evtResp.events);
        }, 3000);
        return () => clearInterval(iv);
      }, [casoId, mode]);

      return (
        <div className="flex h-screen w-full overflow-hidden" style={{ background:'var(--stone-50)', color:'var(--stone-900)' }}>
          {/* ── LEFT RAIL ── */}
          <div className="w-14 h-full flex flex-col items-center py-5 space-y-5 shrink-0"
            style={{ background:'var(--stone-100)', borderRight:'1px solid var(--stone-200)' }}>
            <div className="w-8 h-8 rounded flex items-center justify-center font-serif font-bold text-sm mb-2"
              style={{ background: theme==='dark'?'var(--stone-900)':'var(--accent)', color:'var(--stone-50)' }}>R</div>
            {['search','clock','bookmark'].map(ic =>
              <button key={ic} className="p-1 rounded transition-colors duration-200" style={{ color:'var(--stone-400)' }}
                onMouseEnter={e => e.target.style.color='var(--stone-700)'} onMouseLeave={e => e.target.style.color='var(--stone-400)'}>
                <Icon name={ic} className="w-[18px] h-[18px]" />
              </button>
            )}
            <div className="w-6 h-px" style={{ background:'var(--stone-300)' }} />
            <div className="relative flex items-center justify-center w-full">
              <div className="absolute left-0 w-1 h-7 rounded-r" style={{ background:'var(--accent)' }} />
              <Icon name="briefcase" className="w-[18px] h-[18px]" style={{ color:'var(--accent)' }} />
            </div>
            <button className="p-1 rounded transition-colors duration-200" style={{ color:'var(--stone-400)' }}>
              <Icon name="folder" className="w-[18px] h-[18px]" />
            </button>
            <div className="flex-1" />
            <button onClick={toggleTheme} className="p-1 rounded transition-colors duration-200" style={{ color:'var(--stone-400)' }}>
              <Icon name={theme==='dark'?'sun':'moon'} className="w-[18px] h-[18px]" />
            </button>
            <button className="p-1 rounded" style={{ color:'var(--stone-400)' }}>
              <Icon name="settings" className="w-[18px] h-[18px]" />
            </button>
          </div>

          {/* ── MAIN ── */}
          <div className="flex-1 flex flex-col h-full min-w-0">
            <div className="gold-rule" />

            {/* Top bar — matches main app identity */}
            <div className="h-16 flex items-center justify-between px-7 shrink-0" style={{ borderBottom:'1px solid var(--stone-200)', background: theme==='dark' ? 'rgba(20,18,16,0.85)' : 'rgba(250,250,249,0.85)', backdropFilter:'blur(6px)' }}>
              <div className="flex items-center space-x-4">
                <span style={{ margin:0, fontSize:14, fontWeight:600, letterSpacing:'0.08em', textTransform:'uppercase', color:'var(--stone-900)', fontFamily:'"Inter",sans-serif' }}>RATIO</span>
                <span style={{ margin:0, fontSize:14, fontWeight:500, textTransform:'uppercase', letterSpacing:'0.03em', color:'var(--stone-400)', fontFamily:'"Inter",sans-serif' }}>{'\u00A0'}/ ESCRITORIO</span>
                {mode >= 0 && <>
                  <div className="h-4 w-px" style={{ background:'var(--stone-300)' }} />
                  <AgentAvatars activeAgents={activeAgents} completedAgents={completedAgents} onClickAgent={setAgentDetail} />
                </>}
              </div>
              <div className="flex items-center space-x-3">
                {mode >= 0 && caseState && (
                  <>
                    <span className="font-mono px-2 py-1 rounded" style={{ fontSize:9, color:'var(--stone-500)', border:'1px solid var(--stone-300)' }}>
                      {caseState.status}
                    </span>
                    <BurnMeter cost={caseState.custo_total_usd || 0} />
                  </>
                )}
              </div>
            </div>

            {/* Content */}
            <div className="flex-1 overflow-hidden">
              {mode === -1 && (
                <div className="flex items-center justify-center h-full anim-fade">
                  <div className="max-w-lg w-full text-center space-y-8 px-6">
                    <div>
                      <div className="w-16 h-16 rounded-xl mx-auto flex items-center justify-center mb-5"
                        style={{ background:'var(--accent-dim)', border:'1px solid var(--accent)33' }}>
                        <Icon name="briefcase" className="w-7 h-7" style={{ color:'var(--accent)' }} />
                      </div>
                      <h2 style={{ margin:0, fontSize:22, fontWeight:600, letterSpacing:'0.08em', textTransform:'uppercase', color:'var(--stone-900)', fontFamily:'"Inter",sans-serif' }}>RATIO <span style={{ fontWeight:500, color:'var(--stone-400)', letterSpacing:'0.03em' }}>/ ESCRITORIO</span></h2>
                      <p className="mt-2 text-sm" style={{ color:'var(--stone-500)', maxWidth:380, margin:'8px auto 0' }}>
                        Pipeline multi-agente para redação de peças jurídicas com pesquisa automatizada e revisão adversarial.
                      </p>
                    </div>
                    <div className="flex justify-center space-x-4">
                      <button onClick={() => startCase('peticao_inicial')}
                        className="px-6 py-3 rounded-lg font-semibold text-sm transition-all duration-200"
                        style={{ background:'var(--accent)', color:'var(--stone-50)' }}
                        onMouseEnter={e => e.target.style.filter='brightness(1.12)'} onMouseLeave={e => e.target.style.filter='none'}>
                        <Icon name="file-plus" className="w-4 h-4 inline mr-2" style={{ verticalAlign:'-2px' }} />
                        Nova Petição Inicial
                      </button>
                      <button onClick={() => startCase('contestacao')}
                        className="px-6 py-3 rounded-lg font-semibold text-sm transition-all duration-200"
                        style={{ border:'1px solid var(--stone-300)', color:'var(--stone-700)' }}
                        onMouseEnter={e => e.target.style.borderColor='var(--accent)'} onMouseLeave={e => e.target.style.borderColor='var(--stone-300)'}>
                        <Icon name="shield" className="w-4 h-4 inline mr-2" style={{ verticalAlign:'-2px' }} />
                        Nova Contestação
                      </button>
                    </div>
                    <div className="pt-4">
                      <div className="flex items-center justify-center space-x-6 font-mono" style={{ fontSize:10, color:'var(--stone-400)' }}>
                        {AGENTS.map(a => (
                          <div key={a.id} className="flex items-center space-x-1.5">
                            <div className="w-2 h-2 rounded-full" style={{ background:a.color }} />
                            <span>{a.name}</span>
                            {!a.llm && <span style={{ fontSize:7, color:'var(--stone-500)', border:'1px solid var(--stone-300)', borderRadius:3, padding:'0 3px' }}>código</span>}
                          </div>
                        ))}
                      </div>
                    </div>
                  </div>
                </div>
              )}
              {mode === 0 && <IntakeMode casoId={casoId} state={caseState} onStateUpdate={handleStateUpdate} />}
              {mode === 1 && <WorkspaceMode casoId={casoId} state={caseState} events={events} onStateUpdate={handleStateUpdate} />}
              {mode === 2 && <DeliveryMode casoId={casoId} state={caseState} />}
            </div>
          </div>
          {agentDetail && <AgentDetailModal agentId={agentDetail} state={caseState} events={events} onClose={() => setAgentDetail(null)} />}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
