<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ratio · Escritório</title>
  <link rel="icon" type="image/png" sizes="32x32" href="/escritorio/assets/favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="48x48" href="/escritorio/assets/favicon-48x48.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="/escritorio/assets/apple-touch-icon.png" />
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Merriweather:ital@0;1&display=swap');

    :root {
      --stone-50: #141210; --stone-100: #1c1917; --stone-200: #2e2a27;
      --stone-300: #3a3633; --stone-400: #6b6662; --stone-500: #9a948f;
      --stone-600: #b0aaa5; --stone-700: #c4bfba; --stone-800: #d6d1cc; --stone-900: #e8e5e2;
      --accent: #c4a882; --accent-dim: rgba(196,168,130,0.10);
      --agent-intake: #7c8db5; --agent-pesquisador: #8b7ec7; --agent-redator: #c4a882;
      --agent-contraparte: #c47a6e; --agent-auditor: #7a9e8a; --agent-formatador: #8a9bae;
      --glass: rgba(28,25,23,0.55);
    }
    [data-theme="light"] {
      --stone-50: #fafaf9; --stone-100: #f5f5f4; --stone-200: #e7e5e4;
      --stone-300: #d6d3d1; --stone-400: #a8a29e; --stone-500: #78716c;
      --stone-600: #57534e; --stone-700: #44403c; --stone-800: #292524; --stone-900: #1c1917;
      --glass: rgba(250,250,249,0.7);
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:var(--stone-50);color:var(--stone-900);font-family:'Inter',system-ui,sans-serif;overflow:hidden;height:100vh}
    .font-serif{font-family:'Cormorant Garamond',Georgia,serif}
    .font-mono{font-family:'JetBrains Mono',monospace}
    .font-cite{font-family:'Merriweather',Georgia,serif}
    ::-webkit-scrollbar{width:5px}
    ::-webkit-scrollbar-track{background:transparent}
    ::-webkit-scrollbar-thumb{background:var(--stone-300);border-radius:4px}
    ::-webkit-scrollbar-thumb:hover{background:var(--stone-400)}

    @keyframes fadeIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
    @keyframes slideUp{from{opacity:0;transform:translateY(14px) scale(.98)}to{opacity:1;transform:translateY(0) scale(1)}}
    @keyframes spin-arc{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
    @keyframes pulse-dot{0%,100%{opacity:.25}50%{opacity:1}}
    @keyframes glow{0%,100%{box-shadow:0 0 0 0 transparent}50%{box-shadow:0 0 12px -2px var(--accent)}}
    @keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
    .anim-fade{animation:fadeIn .3s ease-out both}
    .anim-slide{animation:slideUp .35s ease-out both}
    .glow-active{animation:glow 2.2s ease-in-out infinite}

    /* Noise texture overlay */
    .noise::after{content:'';position:fixed;inset:0;pointer-events:none;opacity:.025;
      background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-repeat:repeat;mix-blend-mode:overlay;z-index:9999}

    /* Thin gold accent line at top */
    .gold-rule{height:1px;background:linear-gradient(90deg,transparent 0%,var(--accent) 20%,var(--accent) 80%,transparent 100%);opacity:.4}

    /* Streaming shimmer effect */
    .shimmer{background:linear-gradient(90deg,var(--stone-200) 0%,var(--stone-300) 50%,var(--stone-200) 100%);
      background-size:200% 100%;animation:shimmer 1.8s ease-in-out infinite}

    /* ── Top header ── */
    .ratio-top-header{
      height:64px;
      border-bottom:1px solid var(--stone-200);
      background:rgba(28,25,23,0.85);
      backdrop-filter:blur(6px);
      display:flex;align-items:center;justify-content:space-between;
      padding:0 30px;gap:16px;flex-shrink:0;
    }
    [data-theme="light"] .ratio-top-header{background:rgba(250,250,249,0.85)}
    .ratio-top-brand{display:flex;align-items:center;gap:12px;min-width:0}
    .ratio-top-brand-mark{
      width:auto;height:28px;display:block;object-fit:contain;opacity:.94;
    }
    .ratio-eyebrow{
      margin:0;font-family:'Inter',sans-serif;font-size:14px;font-weight:600;
      letter-spacing:.08em;text-transform:uppercase;color:var(--stone-900);
    }
    .ratio-top-brand h1{
      margin:0;font-family:'Inter',sans-serif;font-size:14px;font-weight:500;
      text-transform:uppercase;letter-spacing:.03em;color:var(--stone-400);
    }
    .ratio-top-brand h1::before{content:"/ "}
    .ratio-top-brand-divider{height:18px;width:1px;background:var(--stone-300);margin:0 4px}
    .ratio-top-actions{display:flex;align-items:center;gap:8px}
  </style>
</head>
<body class="noise">
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback, Fragment } = React;

    /* ══════════ API CLIENT ══════════ */
    const API = '/api/escritorio';
    const api = {
      _f: async (path, opts = {}) => {
        try {
          const r = await fetch(`${API}${path}`, { headers: { 'Content-Type': 'application/json' }, ...opts });
          if (!r.ok) throw new Error(`${r.status}`);
          return await r.json();
        } catch (e) { console.warn(`[escritorio-api] ${opts.method||'GET'} ${path}:`, e.message); return null; }
      },
      createCase: (id, tipo, area) => api._f('/cases', { method: 'POST', body: JSON.stringify({ caso_id: id, tipo_peca: tipo, area_direito: area }) }),
      listCases: () => api._f('/cases'),
      getCase: (id) => api._f(`/cases/${id}`),
      getPipeline: (id) => api._f(`/cases/${id}/pipeline`),
      getEvents: (id) => api._f(`/cases/${id}/events`),
      sendIntake: (id, msg) => api._f(`/cases/${id}/intake`, { method: 'POST', body: JSON.stringify({ message: msg }) }),
      approveGate: (id, gate, approved = true) => api._f(`/cases/${id}/gates/${gate}`, { method: 'POST', body: JSON.stringify({ approved }) }),
      runPipeline: (id) => api._f(`/cases/${id}/run`, { method: 'POST' }),
      submitDraft: (id, sections) => api._f(`/cases/${id}/draft`, { method: 'POST', body: JSON.stringify({ sections }) }),
      runCritique: (id) => api._f(`/cases/${id}/adversarial/critique`, { method: 'POST' }),
      dismissFindings: (id, ids, reason) => api._f(`/cases/${id}/adversarial/dismiss`, { method: 'POST', body: JSON.stringify({ finding_ids: ids, reason }) }),
      submitRevision: (id, updates, notes, finalize) => api._f(`/cases/${id}/adversarial/revise`, { method: 'POST', body: JSON.stringify({ section_updates: updates, notes, finalize }) }),
      archiveCase: (id, archived = true) => api._f(`/cases/${id}/archive`, { method: 'POST', body: JSON.stringify({ archived }) }),
      renameCase: (id, name) => api._f(`/cases/${id}/rename`, { method: 'POST', body: JSON.stringify({ name }) }),
      deleteCase: (id) => api._f(`/cases/${id}`, { method: 'DELETE' }),
      getCaseFolder: (id) => api._f(`/cases/${id}/folder`),
    };

    /* ══════════ AGENTS & PHASES ══════════ */
    const AGENTS = [
      { id:'intake',       name:'Clara',      role:'Analista de Triagem',  color:'var(--agent-intake)',      icon:'message-circle', llm:true },
      { id:'pesquisador',  name:'Theo',       role:'Pesquisador Jurídico', color:'var(--agent-pesquisador)', icon:'search',         llm:true },
      { id:'redator',      name:'Helena',     role:'Redatora de Peças',    color:'var(--agent-redator)',     icon:'pen-tool',       llm:true },
      { id:'contraparte',  name:'Marco',      role:'Adv. Parte Adversa',  color:'var(--agent-contraparte)', icon:'shield-alert',   llm:true },
      { id:'auditor',      name:'Auditor',    role:'Código / Checagem',   color:'var(--agent-auditor)',     icon:'check-circle',   llm:false },
      { id:'formatador',   name:'Formatador', role:'Código / python-docx',color:'var(--agent-formatador)',  icon:'file-text',      llm:false },
    ];
    const PHASES = [
      { id:'intake',      label:'Intake',      num:'01', agent:'intake',      color:'var(--agent-intake)' },
      { id:'research',    label:'Pesquisa',    num:'02', agent:'pesquisador', color:'var(--agent-pesquisador)' },
      { id:'drafting',    label:'Redação',     num:'03', agent:'redator',     color:'var(--agent-redator)' },
      { id:'adversarial', label:'Revisão',      num:'04', agent:'contraparte', color:'var(--agent-contraparte)' },
      { id:'delivery',    label:'Entrega',     num:'05', agent:'auditor',     color:'var(--agent-auditor)' },
    ];

    const shortText = (value, max = 120) => {
      const text = String(value || '').replace(/\s+/g, ' ').trim();
      return text.length > max ? text.slice(0, max - 3).trimEnd() + '...' : text;
    };

    const titleFromSectionKey = (key) => String(key || '')
      .replace(/^do_/, 'dos_')
      .replace(/^da_/, 'das_')
      .split('_')
      .filter(Boolean)
      .map(part => part.charAt(0).toUpperCase() + part.slice(1))
      .join(' ');

    /* ══════════ ICON HELPER ══════════ */
    function Icon({ name, className = "w-5 h-5", style }) {
      const ref = useRef(null);
      useEffect(() => {
        if (ref.current && lucide.icons[name]) {
          ref.current.innerHTML = '';
          const el = lucide.createElement(lucide.icons[name]);
          if (className) el.setAttribute('class', className);
          ref.current.appendChild(el);
        }
      }, [name, className]);
      return <span ref={ref} style={{ display:'inline-flex', alignItems:'center', ...(style||{}) }} />;
    }

    /* ══════════ SHARED COMPONENTS ══════════ */

    const BurnMeter = ({ cost }) => (
      <div className="flex items-center space-x-2 font-mono text-xs rounded-md px-3 py-1.5"
        style={{ border:'1px solid var(--stone-300)', background:'var(--stone-100)' }}>
        <span style={{ color:'var(--stone-500)', fontSize:10 }}>Custo</span>
        <span className="font-medium" style={{ color:'var(--accent)', fontSize:11 }}>R$ {(cost || 0).toFixed(2)}</span>
      </div>
    );

    const AgentBadge = ({ agentId, size = 22, active, done }) => {
      const a = AGENTS.find(x => x.id === agentId) || AGENTS[0];
      const r = size * 0.42, circ = 2 * Math.PI * r;
      return (
        <div className="relative" style={{ width:size, height:size }}>
          <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} className="absolute inset-0">
            <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={a.color} strokeWidth="1.2" opacity={done ? 0.5 : 0.15} />
            {active && <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={a.color} strokeWidth="1.8"
              strokeDasharray={`${circ*0.28} ${circ*0.72}`} strokeLinecap="round"
              style={{ animation:'spin-arc 1.2s linear infinite', transformOrigin:'center' }} />}
          </svg>
          {active && <div className="absolute inset-0 rounded-full" style={{ background:a.color, opacity:0.06, animation:'pulse-dot 2s ease-in-out infinite' }} />}
          <div className="absolute inset-0 flex items-center justify-center">
            {done && !active
              ? <svg width={size*0.4} height={size*0.4} viewBox="0 0 8 8"><polyline points="1.5,4 3.5,6 6.5,2" fill="none" stroke={a.color} strokeWidth="1.2" strokeLinecap="round" strokeLinejoin="round"/></svg>
              : <Icon name={a.icon} className={`w-${Math.round(size*0.4/4)} h-${Math.round(size*0.4/4)}`}
                  style={{ color: active ? a.color : done ? a.color+'99' : 'var(--stone-400)', width:size*0.4, height:size*0.4 }} />}
          </div>
        </div>
      );
    };

    const AgentAvatars = ({ activeAgents = [], completedAgents = [], onClickAgent }) => (
      <div className="flex items-center space-x-1">
        {AGENTS.map(a => {
          const isAct = activeAgents.includes(a.id), isDone = completedAgents.includes(a.id);
          const clickable = isDone || isAct;
          return (
            <div key={a.id} title={`${a.name} · ${a.role}${clickable ? ' (clique para ver)' : ''}`}
              onClick={() => clickable && onClickAgent && onClickAgent(a.id)}
              className={`flex items-center space-x-1.5 rounded-full px-2 py-0.5 transition-all duration-300 ${isAct ? 'glow-active' : ''} ${clickable ? 'cursor-pointer' : ''}`}
              style={{ border:`1px solid ${isDone ? a.color+'55' : isAct ? a.color+'88' : 'var(--stone-300)'}`,
                       background: isDone || isAct ? a.color+'0d' : 'transparent' }}>
              <AgentBadge agentId={a.id} size={16} active={isAct} done={isDone} />
              <span className="font-mono" style={{ fontSize:8, color: isAct ? a.color : isDone ? a.color+'88' : 'var(--stone-400)', whiteSpace:'nowrap' }}>{a.name}</span>
            </div>
          );
        })}
      </div>
    );

    const AgentDetailModal = () => null;

    /* ── In-Column Status ── */
    const InColumnFeed = ({ agentId, color, events, active }) => {
      const msgs = events.filter(e => e.agent === agentId);
      if (!msgs.length && !active) return null;
      const a = AGENTS.find(x => x.id === agentId) || AGENTS[0];
      const last = msgs.length ? msgs[msgs.length - 1] : null;
      const isDone = last && (last.type === 'done' || last.status === 'completed');
      return (
        <div className="mx-2 mt-2 rounded-md shrink-0 transition-all duration-300" style={{ background:'var(--stone-100)', border:`1px solid ${color}33`, borderTop:`2px solid ${color}` }}>
          <div className="flex items-center justify-between px-2.5 py-2" style={{ background:color+'08' }}>
            <div className="flex items-center space-x-2 min-w-0">
              <AgentBadge agentId={agentId} size={20} active={active} done={isDone} />
              <div className="flex flex-col min-w-0">
                <span className="font-semibold leading-none" style={{ fontSize:10, color }}>{a.name}</span>
                {last ? (
                  <span className="font-mono leading-none mt-1 truncate" style={{ fontSize:8, color: isDone ? 'var(--stone-600)' : 'var(--stone-500)' }}>
                    {last.text || last.message || 'Status atualizado'}
                  </span>
                ) : active ? (
                  <span className="font-mono leading-none mt-1" style={{ fontSize:8, color:'var(--stone-500)' }}>Aguardando...</span>
                ) : null}
              </div>
            </div>
            {isDone && !active && <span className="font-mono shrink-0 ml-1" style={{ fontSize:8, color:'var(--stone-500)' }}>{'\u2713'}</span>}
            {active && <div className="flex items-center space-x-0.5 shrink-0 ml-1">
              {[0,0.25,0.5].map(d => <div key={d} className="w-1 h-1 rounded-full" style={{ background:color, animation:`pulse-dot 1.4s ease-in-out infinite`, animationDelay:`${d}s` }} />)}
            </div>}
          </div>
        </div>
      );
    };

    /* ══════════ GATE 1 OVERLAY (Confirmação da Triagem) ══════════ */
    const Gate1Overlay = ({ state, onApprove, onBack }) => {
      const fatos = state.fatos_estruturados || [];
      const provas = state.provas_disponiveis || [];
      const provasRec = state.provas_recomendadas || [];
      const pontos = state.pontos_atencao || [];
      return (
        <div className="fixed inset-0 z-50 flex items-center justify-center anim-fade" style={{ background:'rgba(0,0,0,0.55)', backdropFilter:'blur(6px)' }}>
          <div className="w-full max-w-2xl max-h-[85vh] flex flex-col rounded-xl anim-slide"
               style={{ background:'var(--stone-100)', border:'1px solid var(--stone-300)', boxShadow:'0 24px 48px rgba(0,0,0,0.3)' }}>
            <div className="p-5 pb-3 flex items-start space-x-3" style={{ borderBottom:'1px solid var(--stone-200)' }}>
              <div className="w-9 h-9 rounded-lg flex items-center justify-center shrink-0" style={{ background:'var(--accent-dim)', border:'1px solid var(--accent)44' }}>
                <Icon name="shield-check" className="w-4 h-4" style={{ color:'var(--accent)' }} />
              </div>
              <div className="flex-1 min-w-0">
                <h3 className="font-serif text-lg font-bold" style={{ color:'var(--stone-900)' }}>Confirmação da Triagem</h3>
                <p className="font-mono uppercase tracking-wider mt-1" style={{ fontSize:10, color:'var(--stone-500)' }}>Clara · Análise dos fatos</p>
                <p className="mt-2 text-xs leading-relaxed" style={{ color:'var(--stone-600)' }}>
                  Confirme se Clara entendeu corretamente os fatos, provas e pontos críticos do caso. Ao aprovar, Theo iniciará a pesquisa jurisprudencial.
                </p>
              </div>
            </div>

            <div className="flex-1 overflow-y-auto p-5 space-y-3">
              {fatos.length > 0 && (
                <div className="p-3 rounded-lg" style={{ background:'var(--stone-50)', border:'1px solid var(--stone-200)', borderLeft:'3px solid var(--agent-intake)' }}>
                  <div className="font-mono uppercase tracking-wider mb-1.5" style={{ fontSize:9, color:'var(--agent-intake)' }}>Fatos estruturados ({fatos.length})</div>
                  <ul className="space-y-1">
                    {fatos.map((f, i) => (<li key={i} className="text-xs leading-relaxed" style={{ color:'var(--stone-800)' }}>· {f}</li>))}
                  </ul>
                </div>
              )}
              {provas.length > 0 && (
                <div className="p-3 rounded-lg" style={{ background:'var(--stone-50)', border:'1px solid var(--stone-200)', borderLeft:'3px solid var(--agent-auditor)' }}>
                  <div className="font-mono uppercase tracking-wider mb-1.5" style={{ fontSize:9, color:'var(--agent-auditor)' }}>Provas disponíveis ({provas.length})</div>
                  <ul className="space-y-1">
                    {provas.map((p, i) => (<li key={i} className="text-xs leading-relaxed" style={{ color:'var(--stone-800)' }}>· {p}</li>))}
                  </ul>
                </div>
              )}
              {provasRec.length > 0 && (
                <div className="p-3 rounded-lg" style={{ background:'var(--stone-50)', border:'1px solid var(--stone-200)', borderLeft:'3px solid var(--accent)' }}>
                  <div className="font-mono uppercase tracking-wider mb-1.5" style={{ fontSize:9, color:'var(--accent)' }}>Provas recomendadas ({provasRec.length})</div>
                  <ul className="space-y-1">
                    {provasRec.map((p, i) => (<li key={i} className="text-xs leading-relaxed" style={{ color:'var(--stone-700)' }}>· {p}</li>))}
                  </ul>
                </div>
              )}
              {pontos.length > 0 && (
                <div className="p-3 rounded-lg" style={{ background:'var(--stone-50)', border:'1px solid var(--stone-200)', borderLeft:'3px solid var(--agent-contraparte)' }}>
                  <div className="font-mono uppercase tracking-wider mb-1.5" style={{ fontSize:9, color:'var(--agent-contraparte)' }}>Pontos de atenção ({pontos.length})</div>
                  <ul className="space-y-1">
                    {pontos.map((p, i) => (<li key={i} className="text-xs leading-relaxed" style={{ color:'var(--stone-700)' }}>· {p}</li>))}
                  </ul>
                </div>
              )}
              {fatos.length === 0 && provas.length === 0 && pontos.length === 0 && (
                <div className="text-center py-6 font-mono" style={{ fontSize:11, color:'var(--stone-500)' }}>Nada estruturado ainda — descreva mais fatos antes de aprovar.</div>
              )}
            </div>

            <div className="flex space-x-3 p-5 pt-3" style={{ borderTop:'1px solid var(--stone-200)' }}>
              <button onClick={onBack}
                className="flex-1 py-2.5 text-xs font-medium rounded-lg transition-colors duration-200"
                style={{ border:'1px solid var(--stone-300)', color:'var(--stone-500)' }}>
                ← Revisar fatos
              </button>
              <button onClick={onApprove}
                className="flex-1 py-2.5 text-xs font-semibold rounded-lg transition-all duration-200"
                style={{ background:'var(--accent)', color:'var(--stone-50)' }}>
                Iniciar pesquisa →
              </button>
            </div>
          </div>
        </div>
      );
    };

    /* ══════════ INTAKE MODE ══════════ */
    /* Conectado ao backend real:
       - Lê state via GET /pipeline; restaura intake_history
       - send → POST /intake; concluirTriagem → POST /run (executa intake_graph)
       - Quando state.status === 'gate1' e !gate1_aprovado, abre Gate1Overlay
       - Aprovar chama POST /gates/gate1 (backend transita para 'pesquisa') */
    const IntakeMode = ({ casoId, onGateApprove }) => {
      const [state, setState] = useState(null);
      const [msgs, setMsgs] = useState([
        { role:'assistant', content:'Olá. Descreva os fatos do caso, as partes envolvidas e os documentos disponíveis. Quanto mais detalhado, melhor o resultado.' }
      ]);
      const [input, setInput] = useState('');
      const [loading, setLoading] = useState(false);
      const [analyzing, setAnalyzing] = useState(false);
      const [showGate, setShowGate] = useState(false);
      const btm = useRef(null);

      const refresh = useCallback(async () => {
        if (!casoId) return;
        const data = await api.getPipeline(casoId);
        if (data && data.state) setState(data.state);
      }, [casoId]);

      useEffect(() => {
        refresh();
        const iv = setInterval(refresh, 3000);
        return () => clearInterval(iv);
      }, [refresh]);

      // Restaura histórico de mensagens reais do backend (se existir)
      useEffect(() => {
        if (state && Array.isArray(state.intake_history) && state.intake_history.length > 0) {
          setMsgs(state.intake_history.map(m => ({ role: m.role, content: m.content })));
        }
      }, [state && state.intake_history && state.intake_history.length]);

      // Backend sinaliza pronto para confirmar triagem
      useEffect(() => {
        if (state && state.status === 'gate1' && !state.gate1_aprovado) {
          setShowGate(true);
        }
      }, [state && state.status, state && state.gate1_aprovado]);

      useEffect(() => { btm.current && btm.current.scrollIntoView({ behavior:'smooth' }); }, [msgs.length]);

      const checklist = (state && state.intake_checklist) || { partes_identificadas:false, fatos_principais_cobertos:false, documentos_listados:false };
      const checklistComplete = checklist.partes_identificadas && checklist.fatos_principais_cobertos && checklist.documentos_listados;

      const send = async () => {
        const txt = input.trim();
        if (!txt || loading) return;
        setMsgs(p => [...p, { role:'user', content: txt }]);
        setInput('');
        setLoading(true);
        const resp = await api.sendIntake(casoId, txt);
        if (resp && resp.state) setState(resp.state);
        if (resp && resp.next_question) {
          setMsgs(p => [...p, { role:'assistant', content: resp.next_question }]);
        } else if (!resp) {
          setMsgs(p => [...p, { role:'assistant', content:'Não foi possível conectar ao backend. Verifique se o servidor Ratio está em execução.' }]);
        }
        setLoading(false);
      };

      const concluirTriagem = async () => {
        setAnalyzing(true);
        setMsgs(p => [...p, { role:'assistant', content:'Clara está estruturando os fatos do caso… isso pode levar alguns segundos.' }]);
        const resp = await api.runPipeline(casoId);
        setAnalyzing(false);
        if (resp && resp.state) {
          setState(resp.state);
          // Não força showGate aqui — o efeito acima abre quando status === 'gate1'
        } else {
          setMsgs(p => [...p, { role:'assistant', content:'Falha ao executar a análise. Verifique a chave Gemini e os logs do backend.' }]);
        }
      };

      const approveGate1 = async () => {
        const resp = await api.approveGate(casoId, 'gate1', true);
        if (resp && resp.state) setState(resp.state);
        setShowGate(false);
        if (onGateApprove) onGateApprove();
      };

      return (
        <>
          <div className="flex flex-col h-full max-w-2xl mx-auto w-full pt-8 pb-4 px-5">
            <div className="text-center mb-6 anim-fade">
              <h2 className="font-serif text-2xl font-bold" style={{ color:'var(--stone-900)' }}>Triagem do Caso</h2>
              <p className="mt-1" style={{ fontSize:12, color:'var(--stone-500)' }}>Clara irá analisar os fatos e estruturar o dossiê preliminar</p>
            </div>
            <div className="flex-1 overflow-y-auto space-y-3 mb-4 pr-1">
              {msgs.map((m, i) => (
                <div key={i} className={`flex ${m.role==='user'?'justify-end':'justify-start'} anim-fade`} style={{ animationDelay:`${i*0.05}s` }}>
                  <div className="max-w-[85%] rounded-lg px-4 py-3" style={{
                    background: m.role==='user' ? 'var(--stone-200)' : 'var(--stone-100)',
                    border: m.role==='user' ? 'none' : '1px solid var(--stone-200)',
                    borderLeft: m.role==='assistant' ? '2px solid var(--agent-intake)' : 'none',
                  }}>
                    <p className="text-sm whitespace-pre-wrap leading-relaxed" style={{ color: m.role==='user' ? 'var(--stone-900)' : 'var(--stone-700)' }}>{m.content}</p>
                  </div>
                </div>
              ))}
              {(loading || analyzing) && (
                <div className="flex justify-start">
                  <div className="rounded-lg px-4 py-3 shimmer" style={{ width:180, height:40, borderLeft:'2px solid var(--agent-intake)' }} />
                </div>
              )}
              <div ref={btm} />
            </div>
            {(checklist.partes_identificadas || checklist.fatos_principais_cobertos || checklist.documentos_listados) && !showGate && (
              <div className="mb-3 anim-fade rounded-lg p-3" style={{ background:'var(--stone-100)', border:'1px solid var(--stone-200)' }}>
                <div className="flex items-center justify-between mb-2">
                  <span className="font-mono uppercase tracking-wider" style={{ fontSize:9, color:'var(--stone-500)' }}>Informações detectadas</span>
                  {checklistComplete && (
                    <button onClick={concluirTriagem} disabled={analyzing}
                      className="px-4 py-1.5 text-xs font-semibold rounded-md transition-all duration-200"
                      style={{ background:'var(--agent-intake)', color:'white', opacity: analyzing ? 0.5 : 1 }}>
                      {analyzing ? 'Estruturando...' : 'Concluir triagem →'}
                    </button>
                  )}
                </div>
                <div className="grid grid-cols-3 gap-2 font-mono" style={{ fontSize:10 }}>
                  {[['Partes','partes_identificadas'],['Fatos','fatos_principais_cobertos'],['Documentos','documentos_listados']].map(([lbl,key]) => (
                    <div key={key} className="flex items-center space-x-1.5">
                      <span style={{ color: checklist[key] ? 'var(--agent-auditor)' : 'var(--stone-400)' }}>{checklist[key] ? '✓' : '○'}</span>
                      <span style={{ color: checklist[key] ? 'var(--stone-700)' : 'var(--stone-500)' }}>{lbl}</span>
                    </div>
                  ))}
                </div>
              </div>
            )}
            <div className="flex items-end rounded-lg p-2 transition-colors duration-200" style={{ background:'var(--stone-100)', border:'1px solid var(--stone-200)' }}>
              <textarea value={input} onChange={e => setInput(e.target.value)}
                onKeyDown={e => { if (e.key==='Enter' && !e.shiftKey) { e.preventDefault(); send(); } }}
                placeholder="Descreva os fatos do caso..." rows={2}
                className="flex-1 bg-transparent border-none outline-none resize-none px-2 text-sm" style={{ color:'var(--stone-900)' }} />
              <button onClick={send} disabled={loading} className="p-2 rounded transition-opacity" style={{ color:'var(--agent-intake)', opacity: loading?0.4:1 }}>
                <Icon name="send" className="w-4 h-4" />
              </button>
            </div>
          </div>
          {showGate && state && (
            <Gate1Overlay state={state} onApprove={approveGate1} onBack={() => setShowGate(false)} />
          )}
        </>
      );
    };

    /* ══════════ WORKSPACE MODE ══════════ */
    /* Conectado ao backend real:
       - Lê state via GET /api/escritorio/cases/{id}/pipeline (campo state + pipeline)
       - Dispara POST /run nas transições (intake→pesquisa→gate2→redacao→adversarial→entrega)
       - Gate2 abre modal explicativo (teses reais, não números) e chama POST /gates/gate2
       - Editor de seções persiste via POST /draft (peca_sections)
       - Conclusão automática quando state.output_docx_path é preenchido */
    const WorkspaceMode = ({ casoId, onFinish, feedEvents }) => {
      const [state, setState] = useState(null);            // RatioEscritorioState
      const [pipeline, setPipeline] = useState(null);      // _pipeline_payload
      const [running, setRunning] = useState(false);       // lock para /run
      const [showGate2, setShowGate2] = useState(false);
      const [editKey, setEditKey] = useState(null);
      const [editValue, setEditValue] = useState('');
      const [expandedTeseId, setExpandedTeseId] = useState(null);
      const triggeredRef = useRef({ research: false, draft: false });

      // status (backend) → índice da última fase concluída em PHASES
      // PHASES: 0=intake, 1=research, 2=drafting, 3=adversarial, 4=delivery
      const statusToPhase = (status) => {
        if (!status || status === 'intake' || status === 'gate1') return -1;
        if (status === 'pesquisa' || status === 'gate2') return 0;
        if (status === 'redacao') return 1;
        if (['adversarial','revisao_humana','verificacao'].includes(status)) return 2;
        if (status === 'entrega') return 3;
        if (status === 'finalizado') return 4;
        return 0;
      };
      const phase = statusToPhase((pipeline && pipeline.status) || (state && state.status));

      // ── Polling do estado real ──
      const refresh = useCallback(async () => {
        if (!casoId) return;
        const data = await api.getPipeline(casoId);
        if (data) {
          if (data.state) setState(data.state);
          if (data.pipeline) setPipeline(data.pipeline);
        }
      }, [casoId]);

      useEffect(() => {
        refresh();
        const iv = setInterval(refresh, 3000);
        return () => clearInterval(iv);
      }, [refresh]);

      // ── /run automático nas transições naturais ──
      useEffect(() => {
        if (!state || running) return;
        const status = state.status;

        // (a) Pesquisa: rodar drafting_graph (pesquisa+curadoria) até atingir gate2
        const needsResearch =
          status === 'pesquisa' &&
          (!state.teses || state.teses.length === 0) &&
          !triggeredRef.current.research;

        // (b) Após gate2 aprovado: rodar redação + adversarial até gerar docx
        const needsDraftAndReview =
          state.gate2_aprovado &&
          !state.output_docx_path &&
          !triggeredRef.current.draft &&
          ['redacao','adversarial','revisao_humana','verificacao'].includes(status);

        if (needsResearch || needsDraftAndReview) {
          if (needsResearch) triggeredRef.current.research = true;
          if (needsDraftAndReview) triggeredRef.current.draft = true;
          (async () => {
            setRunning(true);
            const resp = await api.runPipeline(casoId);
            if (resp && resp.state) setState(resp.state);
            if (resp && resp.pipeline) setPipeline(resp.pipeline);
            setRunning(false);
          })();
        }
      }, [state, running, casoId]);

      // ── Mostra gate2 quando backend sinalizar ──
      useEffect(() => {
        if (state && state.status === 'gate2' && !state.gate2_aprovado) {
          setShowGate2(true);
        }
      }, [state && state.status, state && state.gate2_aprovado]);

      // ── Conclusão: documento gerado → segue para Delivery ──
      useEffect(() => {
        if (state && state.output_docx_path) onFinish();
      }, [state && state.output_docx_path, onFinish]);

      const teses = (state && state.teses) || [];
      const sections = (state && state.peca_sections) || {};
      const sectionEntries = Object.entries(sections);
      const critica = (state && state.critica_atual) || null;
      const rodadaAtual = (state && state.rodada_atual) || 0;
      const advScore = critica && typeof critica.score_de_risco === 'number' ? critica.score_de_risco : 0;
      const todasFalhas = critica
        ? [...(critica.falhas_processuais || []), ...(critica.argumentos_materiais_fracos || [])]
        : [];

      const approveGate2 = async () => {
        await api.approveGate(casoId, 'gate2', true);
        setShowGate2(false);
        triggeredRef.current.draft = false;
        await refresh();
      };

      const runAnotherCritique = async () => {
        triggeredRef.current.draft = false;
        setRunning(true);
        const resp = await api.runPipeline(casoId);
        if (resp && resp.state) setState(resp.state);
        if (resp && resp.pipeline) setPipeline(resp.pipeline);
        setRunning(false);
      };

      const openSectionEditor = (key) => {
        setEditKey(key);
        setEditValue(sections[key] || '');
      };

      const saveSection = async () => {
        if (!editKey) return;
        const updated = { ...sections, [editKey]: editValue };
        const resp = await api.submitDraft(casoId, updated);
        if (resp && resp.state) setState(resp.state);
        setEditKey(null);
        setEditValue('');
      };

      // ── Conteúdo de cada coluna (a partir do state real) ──
      const renderResearchColumn = () => (
        <>
          {teses.length === 0 && (
            <div className="flex items-center justify-center h-16 font-mono" style={{ fontSize:10, color:'var(--stone-400)' }}>
              {running ? 'Pesquisando teses...' : 'Aguardando pesquisa'}
            </div>
          )}
          {teses.map((t) => {
            const expanded = expandedTeseId === t.id;
            const fav = (t.jurisprudencia_favoravel || []).length;
            const con = (t.jurisprudencia_contraria || []).length;
            const leg = (t.legislacao || []).length;
            return (
              <div key={t.id} onClick={() => setExpandedTeseId(expanded ? null : t.id)}
                className="p-3 rounded-lg cursor-pointer transition-all duration-200"
                style={{ background:'var(--stone-200)', border:'1px solid var(--stone-300)', borderLeft:'3px solid var(--agent-pesquisador)' }}
                onMouseEnter={e => e.currentTarget.style.transform='translateY(-1px)'}
                onMouseLeave={e => e.currentTarget.style.transform='none'}>
                <h4 className="text-xs font-semibold mb-1" style={{ color:'var(--stone-900)' }}>{shortText(t.descricao || t.id, 90)}</h4>
                <p className="leading-relaxed font-mono" style={{ fontSize:9, color:'var(--stone-500)' }}>
                  {t.tipo || 'principal'} · {fav} fav · {con} contra · {leg} leg · confiança {t.confianca || 'media'}
                </p>
                {expanded && (
                  <div className="mt-2.5 pt-2 space-y-1.5" style={{ borderTop:'1px solid var(--stone-300)' }}>
                    {(t.jurisprudencia_favoravel || []).slice(0, 5).map((d, di) => (
                      <div key={di} className="p-2 rounded" style={{ background:'var(--stone-100)', border:'1px solid var(--stone-200)' }}>
                        <span className="font-mono font-medium" style={{ fontSize:9, color:'var(--agent-pesquisador)' }}>
                          {d.processo || d.numero || d.id || '—'} · {d.tribunal || d.fonte || ''}
                        </span>
                        {(d.ementa || d.resumo || d.titulo) && (
                          <p className="font-cite italic mt-0.5" style={{ fontSize:10, color:'var(--stone-500)' }}>
                            {shortText(d.ementa || d.resumo || d.titulo, 220)}
                          </p>
                        )}
                      </div>
                    ))}
                    {(t.jurisprudencia_contraria || []).length > 0 && (
                      <div className="font-mono pt-1" style={{ fontSize:8, color:'var(--agent-contraparte)' }}>
                        {(t.jurisprudencia_contraria || []).length} decisões contrárias mapeadas
                      </div>
                    )}
                  </div>
                )}
              </div>
            );
          })}
        </>
      );

      const renderDraftingColumn = () => (
        <>
          {sectionEntries.length === 0 && (
            <div className="flex items-center justify-center h-16 font-mono" style={{ fontSize:10, color:'var(--stone-400)' }}>
              {running ? 'Redigindo seções...' : 'Aguardando redação'}
            </div>
          )}
          {sectionEntries.map(([key, content]) => (
            <div key={key} onClick={() => openSectionEditor(key)}
              className="p-3 rounded-lg cursor-pointer transition-all duration-200"
              style={{ background:'var(--stone-200)', border:'1px solid var(--stone-300)', borderLeft:'3px solid var(--agent-redator)' }}
              onMouseEnter={e => e.currentTarget.style.transform='translateY(-1px)'}
              onMouseLeave={e => e.currentTarget.style.transform='none'}>
              <h4 className="text-xs font-semibold mb-1" style={{ color:'var(--stone-900)' }}>{titleFromSectionKey(key)}</h4>
              <p className="leading-relaxed line-clamp-2" style={{ fontSize:10, color:'var(--stone-500)' }}>{shortText(content, 160)}</p>
            </div>
          ))}
        </>
      );

      const renderAdversarialColumn = () => (
        <>
          {!critica && todasFalhas.length === 0 && (
            <div className="flex items-center justify-center h-16 font-mono" style={{ fontSize:10, color:'var(--stone-400)' }}>
              {running ? 'Stress test em andamento...' : 'Aguardando análise adversarial'}
            </div>
          )}
          {todasFalhas.map((f, i) => (
            <div key={f.finding_id || i}
              className="p-3 rounded-lg transition-all duration-200"
              style={{ background:'var(--stone-200)', border:'1px solid var(--stone-300)', borderLeft:'3px solid var(--agent-contraparte)' }}>
              <h4 className="text-xs font-semibold mb-1" style={{ color:'var(--stone-900)' }}>{shortText(f.descricao, 90)}</h4>
              <p className="leading-relaxed line-clamp-2 font-cite italic" style={{ fontSize:10, color:'var(--stone-500)' }}>
                {shortText(f.argumento_contrario, 160)}
              </p>
              <div className="flex items-center mt-1.5 space-x-2 font-mono" style={{ fontSize:9 }}>
                <span style={{ color:'var(--agent-contraparte)' }}>{f.gravidade}</span>
                <span style={{ color:'var(--stone-400)' }}>·</span>
                <span style={{ color:'var(--stone-500)' }}>{f.tipo}</span>
                {f.secao_afetada && (
                  <>
                    <span style={{ color:'var(--stone-400)' }}>·</span>
                    <span style={{ color:'var(--stone-500)' }}>{f.secao_afetada}</span>
                  </>
                )}
              </div>
            </div>
          ))}
          {critica && (
            <div className="mt-1 p-3 rounded-lg" style={{ background:'var(--stone-100)', border:'1px dashed var(--agent-contraparte)55' }}>
              <div className="flex justify-between items-center mb-2.5">
                <span className="font-mono font-bold" style={{ fontSize:10, color:'var(--agent-contraparte)' }}>Rodada {rodadaAtual}</span>
                <span className="font-mono font-medium" style={{ fontSize:10, color: advScore > 25 ? 'var(--agent-contraparte)' : 'var(--agent-auditor)' }}>
                  Score: {advScore}/100
                </span>
              </div>
              <div className="w-full h-1.5 rounded-full mb-3" style={{ background:'var(--stone-200)' }}>
                <div className="h-full rounded-full transition-all duration-700"
                  style={{ width:`${Math.max(0, Math.min(100, advScore))}%`,
                           background: advScore > 25 ? 'var(--agent-contraparte)' : 'var(--agent-auditor)' }} />
              </div>
              {critica.analise_contestacao && (
                <p className="font-cite italic mb-2" style={{ fontSize:10, color:'var(--stone-600)' }}>
                  {shortText(critica.analise_contestacao, 200)}
                </p>
              )}
              <div className="flex space-x-2">
                <button onClick={runAnotherCritique} disabled={running}
                  className="flex-1 py-1.5 font-semibold rounded transition-all duration-200"
                  style={{ fontSize:10, border:'1px solid var(--agent-contraparte)55', color:'var(--agent-contraparte)', opacity: running ? 0.4 : 1 }}>
                  + Rodada
                </button>
                <button onClick={onFinish}
                  className="flex-1 py-1.5 font-semibold rounded transition-all duration-200"
                  style={{ fontSize:10, background:'var(--agent-auditor)', color:'white' }}>
                  Finalizar
                </button>
              </div>
            </div>
          )}
        </>
      );

      const renderDeliveryColumn = () => (
        <div className="flex items-center justify-center h-16 font-mono text-center px-2" style={{ fontSize:10, color:'var(--stone-400)' }}>
          {state && state.output_docx_path
            ? 'Documento pronto para entrega'
            : (running ? 'Verificando e formatando...' : 'Aguardando verificação')}
        </div>
      );

      const columnContent = [
        null,                       // 0 intake (concluído)
        renderResearchColumn(),     // 1 research
        renderDraftingColumn(),     // 2 drafting
        renderAdversarialColumn(),  // 3 adversarial
        renderDeliveryColumn(),     // 4 delivery
      ];

      const phaseAgentMap = { 0:'intake', 1:'pesquisador', 2:'redator', 3:'contraparte', 4:'auditor' };

      return (
        <div className="flex h-full w-full">
          <div className="flex flex-1 min-w-0">
            {PHASES.map((ph, i) => {
              const active = i === phase + 1;
              const past = i <= phase;
              return (
                <div key={ph.id} className="flex-1 flex flex-col min-w-0 transition-all duration-300"
                  style={{ borderRight:'1px solid var(--stone-200)', opacity: !past && !active ? 0.2 : 1 }}>
                  <div className="p-3 shrink-0" style={{ borderBottom:'1px solid var(--stone-200)', background:'var(--stone-100)' }}>
                    <div className="flex items-center justify-between">
                      <div className="flex items-center space-x-2">
                        <span className="font-mono font-bold" style={{ fontSize:10, color:ph.color }}>{ph.num}</span>
                        <span className="text-xs font-semibold" style={{ color: active ? ph.color : past ? 'var(--stone-700)' : 'var(--stone-500)' }}>{ph.label}</span>
                      </div>
                    </div>
                    {active && <div className="h-0.5 mt-2 rounded-full transition-all duration-500" style={{ background:ph.color }} />}
                  </div>
                  <InColumnFeed agentId={phaseAgentMap[i]} color={ph.color} events={feedEvents || []} active={active && running} />
                  <div className="flex-1 p-2 overflow-y-auto space-y-2">
                    {columnContent[i]}
                  </div>
                </div>
              );
            })}
          </div>

          {/* Editor de seções — persiste via /draft */}
          {editKey && (
            <div className="fixed inset-0 z-50 flex items-center justify-center anim-fade" style={{ background:'rgba(0,0,0,0.5)', backdropFilter:'blur(6px)' }}>
              <div className="w-full max-w-2xl max-h-[80vh] flex flex-col rounded-xl anim-slide" style={{ background:'var(--stone-100)', border:'1px solid var(--stone-300)', boxShadow:'0 24px 48px rgba(0,0,0,0.3)' }}>
                <div className="flex items-center justify-between p-4" style={{ borderBottom:'1px solid var(--stone-200)' }}>
                  <h3 className="font-serif text-lg font-bold" style={{ color:'var(--stone-900)' }}>{titleFromSectionKey(editKey)}</h3>
                  <div className="flex items-center space-x-2">
                    <button onClick={saveSection}
                      className="px-4 py-1.5 text-xs font-semibold rounded-lg transition-all duration-200"
                      style={{ background:'var(--accent)', color:'var(--stone-50)' }}>
                      Salvar
                    </button>
                    <button onClick={() => { setEditKey(null); setEditValue(''); }} style={{ color:'var(--stone-400)' }}>
                      <Icon name="x" className="w-4 h-4" />
                    </button>
                  </div>
                </div>
                <textarea className="flex-1 p-5 bg-transparent border-none outline-none resize-none text-sm leading-relaxed"
                  style={{ color:'var(--stone-800)' }} value={editValue}
                  onChange={(e) => setEditValue(e.target.value)} />
              </div>
            </div>
          )}

          {/* Gate 2 — pausa humana com explicação real (não apenas números) */}
          {showGate2 && state && (
            <Gate2Overlay state={state} onApprove={approveGate2} onBack={() => setShowGate2(false)} />
          )}
        </div>
      );
    };

    /* ══════════ GATE 2 OVERLAY ══════════ */
    const Gate2Overlay = ({ state, onApprove, onBack }) => {
      const teses = state.teses || [];
      const totalFav = teses.reduce((acc, t) => acc + ((t.jurisprudencia_favoravel || []).length), 0);
      const totalCon = teses.reduce((acc, t) => acc + ((t.jurisprudencia_contraria || []).length), 0);
      const totalLeg = teses.reduce((acc, t) => acc + ((t.legislacao || []).length), 0);
      const pontos = state.pontos_atencao || [];
      return (
        <div className="fixed inset-0 z-50 flex items-center justify-center anim-fade" style={{ background:'rgba(0,0,0,0.55)', backdropFilter:'blur(6px)' }}>
          <div className="w-full max-w-2xl max-h-[85vh] flex flex-col rounded-xl anim-slide"
               style={{ background:'var(--stone-100)', border:'1px solid var(--stone-300)', boxShadow:'0 24px 48px rgba(0,0,0,0.3)' }}>
            <div className="p-5 pb-3 flex items-start space-x-3" style={{ borderBottom:'1px solid var(--stone-200)' }}>
              <div className="w-9 h-9 rounded-lg flex items-center justify-center shrink-0" style={{ background:'var(--accent-dim)', border:'1px solid var(--accent)44' }}>
                <Icon name="shield-check" className="w-4 h-4" style={{ color:'var(--accent)' }} />
              </div>
              <div className="flex-1 min-w-0">
                  <h3 className="font-serif text-lg font-bold" style={{ color:'var(--stone-900)' }}>Confirmação da Pesquisa</h3>
                  <p className="font-mono uppercase tracking-wider mt-1" style={{ fontSize:10, color:'var(--stone-500)' }}>Theo · Base de pesquisa</p>
                <p className="mt-2 text-xs leading-relaxed" style={{ color:'var(--stone-600)' }}>
                  Theo identificou {teses.length} tese{teses.length === 1 ? '' : 's'} com {totalFav} decisões favoráveis, {totalCon} contrárias e {totalLeg} dispositivos legais. Revise abaixo antes de iniciar a redação.
                </p>
              </div>
            </div>

            <div className="flex-1 overflow-y-auto p-5 space-y-3">
              {teses.length === 0 && (
                <div className="text-center py-6 font-mono" style={{ fontSize:11, color:'var(--stone-500)' }}>
                  Nenhuma tese identificada ainda.
                </div>
              )}
              {teses.map((t) => (
                <div key={t.id} className="p-3 rounded-lg" style={{ background:'var(--stone-50)', border:'1px solid var(--stone-200)', borderLeft:'3px solid var(--agent-pesquisador)' }}>
                  <div className="flex items-center justify-between mb-1">
                    <span className="font-mono uppercase tracking-wider" style={{ fontSize:9, color:'var(--agent-pesquisador)' }}>{t.tipo || 'principal'}</span>
                    <span className="font-mono" style={{ fontSize:9, color:'var(--stone-500)' }}>confiança: {t.confianca || 'media'}</span>
                  </div>
                  <p className="text-xs leading-relaxed mb-2" style={{ color:'var(--stone-800)' }}>{t.descricao || t.id}</p>
                  <div className="flex items-center space-x-3 font-mono" style={{ fontSize:9, color:'var(--stone-500)' }}>
                    <span><strong style={{ color:'var(--agent-auditor)' }}>{(t.jurisprudencia_favoravel || []).length}</strong> favoráveis</span>
                    <span><strong style={{ color:'var(--agent-contraparte)' }}>{(t.jurisprudencia_contraria || []).length}</strong> contrárias</span>
                    <span><strong style={{ color:'var(--stone-700)' }}>{(t.legislacao || []).length}</strong> dispositivos</span>
                  </div>
                </div>
              ))}

              {pontos.length > 0 && (
                <div className="p-3 rounded-lg" style={{ background:'var(--stone-50)', border:'1px solid var(--stone-200)', borderLeft:'3px solid var(--agent-contraparte)' }}>
                  <div className="font-mono uppercase tracking-wider mb-1.5" style={{ fontSize:9, color:'var(--agent-contraparte)' }}>Pontos de atenção</div>
                  <ul className="space-y-1">
                    {pontos.map((p, i) => (
                      <li key={i} className="text-xs leading-relaxed" style={{ color:'var(--stone-700)' }}>· {p}</li>
                    ))}
                  </ul>
                </div>
              )}
            </div>

            <div className="flex space-x-3 p-5 pt-3" style={{ borderTop:'1px solid var(--stone-200)' }}>
              <button onClick={onBack}
                className="flex-1 py-2.5 text-xs font-medium rounded-lg transition-colors duration-200"
                style={{ border:'1px solid var(--stone-300)', color:'var(--stone-500)' }}>
                ← Revisar pesquisa
              </button>
              <button onClick={onApprove}
                className="flex-1 py-2.5 text-xs font-semibold rounded-lg transition-all duration-200"
                style={{ background:'var(--accent)', color:'var(--stone-50)' }}>
                Iniciar redação →
              </button>
            </div>
          </div>
        </div>
      );
    };

    /* ══════════ DELIVERY MODE ══════════ */
    /* Conectado ao backend real:
       - Lê verificacoes, rodadas, critica_atual, custo_total_usd, output_docx_path
       - Botão "Abrir documento" só ativa quando state.output_docx_path existe */
    const DeliveryMode = ({ casoId }) => {
      const [state, setState] = useState(null);

      const refresh = useCallback(async () => {
        if (!casoId) return;
        const data = await api.getCase(casoId);
        if (data && data.state) setState(data.state);
      }, [casoId]);

      useEffect(() => {
        refresh();
        const iv = setInterval(refresh, 5000);
        return () => clearInterval(iv);
      }, [refresh]);

      const verificacoes = (state && state.verificacoes) || [];
      const rodadas = (state && state.rodadas) || [];
      const ultimaCritica = rodadas.length > 0
        ? rodadas[rodadas.length - 1].critica_contraparte
        : (state && state.critica_atual);
      const advScore = ultimaCritica && typeof ultimaCritica.score_de_risco === 'number' ? ultimaCritica.score_de_risco : null;
      const rodadaCount = rodadas.length || (state && state.rodada_atual) || 0;
      const custo = state && typeof state.custo_total_usd === 'number' ? state.custo_total_usd : 0;
      const docPath = state && state.output_docx_path ? state.output_docx_path : '';
      const finalizado = !!docPath;

      const checks = [
        {
          l: 'Verificações',
          v: verificacoes.length > 0 ? `${verificacoes.length} checagem(ns)` : (finalizado ? 'Sem registros' : 'Pendente'),
          c: 'var(--agent-auditor)'
        },
        {
          l: 'Rodadas adversariais',
          v: advScore !== null ? `${rodadaCount} rodada(s) · score ${advScore}/100` : `${rodadaCount} rodada(s)`,
          c: 'var(--agent-contraparte)'
        },
        {
          l: 'Documento final',
          v: finalizado ? 'Gerado (.docx)' : 'Aguardando',
          c: finalizado ? 'var(--stone-700)' : 'var(--stone-500)'
        },
        {
          l: 'Custo (USD)',
          v: `$ ${custo.toFixed(4)}`,
          c: 'var(--accent)'
        },
      ];

      const openDoc = () => {
        if (!docPath) return;
        try {
          const normalized = docPath.replace(/\\/g, '/');
          window.open(`file:///${normalized}`, '_blank');
        } catch (e) { console.warn('Não foi possível abrir o documento:', e); }
      };

      return (
        <div className="flex items-center justify-center h-full p-8 anim-fade">
          <div className="max-w-md w-full rounded-xl p-8 text-center space-y-5 anim-slide" style={{ background:'var(--stone-100)', border:'1px solid var(--stone-300)', boxShadow:'0 16px 40px rgba(0,0,0,0.15)' }}>
            <div className="w-16 h-16 rounded-full mx-auto flex items-center justify-center" style={{ background:'var(--agent-auditor)18', border:'2px solid var(--agent-auditor)' }}>
              <Icon name={finalizado ? 'check-circle' : 'clock'} className="w-8 h-8" style={{ color:'var(--agent-auditor)' }} />
            </div>
            <div>
              <h2 className="font-serif text-2xl font-bold" style={{ color:'var(--stone-900)' }}>
                {finalizado ? 'Pipeline Concluído' : 'Aguardando documento final'}
              </h2>
              <p className="font-cite italic text-sm mt-1" style={{ color:'var(--stone-500)' }}>
                {finalizado ? 'Verificação completa. Documento pronto para protocolo.' : 'A revisão adversarial e a verificação ainda estão em andamento.'}
              </p>
            </div>
            <div className="text-left font-mono space-y-0.5 p-4 rounded-lg" style={{ fontSize:10, background:'var(--stone-50)', border:'1px solid var(--stone-200)' }}>
              {checks.map((x, i) => (
                <div key={i} className="flex justify-between py-2" style={{ borderBottom: i<checks.length-1 ? '1px solid var(--stone-200)' : 'none' }}>
                  <span style={{ color:'var(--stone-500)' }}>{x.l}</span>
                  <span className="font-medium" style={{ color:x.c }}>{x.v}</span>
                </div>
              ))}
            </div>
            {verificacoes.length > 0 && (
              <div className="text-left font-mono space-y-1 p-3 rounded-lg" style={{ fontSize:9, background:'var(--stone-50)', border:'1px solid var(--stone-200)' }}>
                {verificacoes.map((v, i) => {
                  const ok = v.ok || v.passed || v.aprovado;
                  return (
                    <div key={i} className="flex items-start space-x-1.5">
                      <span style={{ color: ok ? 'var(--agent-auditor)' : 'var(--agent-contraparte)' }}>{ok ? '✓' : '✗'}</span>
                      <span style={{ color:'var(--stone-700)' }}>{v.descricao || v.tipo || v.nome || JSON.stringify(v)}</span>
                    </div>
                  );
                })}
              </div>
            )}
            <div className="space-y-2 pt-2">
              <button onClick={openDoc} disabled={!finalizado}
                className="w-full py-2.5 text-xs font-semibold rounded-lg flex items-center justify-center transition-all duration-200"
                style={{ background:'var(--agent-auditor)', color:'white', opacity: finalizado ? 1 : 0.4, cursor: finalizado ? 'pointer' : 'not-allowed' }}
                onMouseEnter={e => { if (finalizado) e.currentTarget.style.filter='brightness(1.15)'; }}
                onMouseLeave={e => e.currentTarget.style.filter='none'}>
                <Icon name="download" className="w-4 h-4 mr-2" /> {finalizado ? 'Abrir Petição (.docx)' : 'Aguardando documento final'}
              </button>
            </div>
          </div>
        </div>
      );
    };

    /* ══════════ CASES SIDEBAR ══════════ */
    const STATUS_LABELS = {
      intake:'Triagem', gate1:'Aguardando confirmação', pesquisa:'Pesquisa',
      gate2:'Aguardando confirmação', redacao:'Redação', adversarial:'Revisão',
      revisao_humana:'Revisão humana', verificacao:'Verificação',
      entrega:'Entrega', finalizado:'Finalizado',
    };
    const TIPO_LABELS = { peticao_inicial:'Petição Inicial', contestacao:'Contestação' };

    const formatRelative = (iso) => {
      if (!iso) return '';
      const t = Date.parse(iso.replace(' ', 'T') + (iso.includes('Z') ? '' : 'Z'));
      if (Number.isNaN(t)) return iso;
      const diff = (Date.now() - t) / 1000;
      if (diff < 60) return 'agora';
      if (diff < 3600) return `${Math.floor(diff/60)} min`;
      if (diff < 86400) return `${Math.floor(diff/3600)} h`;
      if (diff < 86400*7) return `${Math.floor(diff/86400)} d`;
      return new Date(t).toLocaleDateString('pt-BR');
    };

    const CasesSidebar = ({ currentCasoId, onOpen, onNewCase }) => {
      const [collapsed, setCollapsed] = useState(false);
      const [cases, setCases] = useState([]);
      const [loading, setLoading] = useState(false);
      const [search, setSearch] = useState('');
      const [showArchived, setShowArchived] = useState(false);
      const [filterStatus, setFilterStatus] = useState('todos');
      const [renamingId, setRenamingId] = useState(null);
      const [renameValue, setRenameValue] = useState('');
      const renameInputRef = useRef(null);

      const refresh = useCallback(async () => {
        setLoading(true);
        const list = await api.listCases();
        setCases(Array.isArray(list) ? list : []);
        setLoading(false);
      }, []);

      useEffect(() => { refresh(); }, [refresh, currentCasoId]);
      useEffect(() => {
        const iv = setInterval(refresh, 8000);
        return () => clearInterval(iv);
      }, [refresh]);

      useEffect(() => {
        if (renamingId && renameInputRef.current) renameInputRef.current.focus();
      }, [renamingId]);

      const handleArchive = async (id, archived) => {
        await api.archiveCase(id, archived);
        refresh();
      };

      const handleDelete = async (id) => {
        if (!confirm('Tem certeza que deseja excluir este caso? Esta ação não pode ser desfeita.')) return;
        await api.deleteCase(id);
        refresh();
      };

      const handleOpenFolder = async (id) => {
        const resp = await api.getCaseFolder(id);
        if (resp && resp.path) {
          try {
            const normalized = resp.path.replace(/\//g, '\\');
            window.open(`file:///${normalized}`, '_blank');
          } catch (e) { console.warn('Não foi possível abrir a pasta:', e); }
        }
      };

      const startRename = (c) => {
        setRenamingId(c.caso_id);
        setRenameValue(c.area_direito || '');
      };

      const confirmRename = async () => {
        if (renamingId && renameValue.trim()) {
          await api.renameCase(renamingId, renameValue.trim());
          refresh();
        }
        setRenamingId(null);
        setRenameValue('');
      };

      const cancelRename = () => {
        setRenamingId(null);
        setRenameValue('');
      };

      const visible = cases.filter(c => {
        if (showArchived ? !c.archived : !!c.archived) return false;
        if (filterStatus !== 'todos' && c.status !== filterStatus) return false;
        if (search) {
          const s = search.toLowerCase();
          if (!(`${c.caso_id} ${c.area_direito || ''}`.toLowerCase().includes(s))) return false;
        }
        return true;
      });

      if (collapsed) {
        return (
          <div className="h-full flex flex-col items-center py-4 shrink-0"
            style={{ width:36, background:'var(--stone-100)', borderRight:'1px solid var(--stone-200)' }}>
            <button onClick={() => setCollapsed(false)} title="Mostrar casos"
              className="p-1.5 rounded transition-colors duration-200" style={{ color:'var(--stone-400)' }}
              onMouseEnter={e => e.currentTarget.style.color='var(--stone-700)'}
              onMouseLeave={e => e.currentTarget.style.color='var(--stone-400)'}>
              <Icon name="panel-left-open" className="w-[18px] h-[18px]" />
            </button>
          </div>
        );
      }

      return (
        <aside className="h-full flex flex-col shrink-0"
          style={{ width:268, background:'var(--stone-100)', borderRight:'1px solid var(--stone-200)' }}>
          {/* Header */}
          <div className="flex items-center justify-between px-4 pt-4 pb-3">
            <div className="flex items-center gap-2">
              <Icon name="folder" className="w-[14px] h-[14px]" style={{ color:'var(--stone-500)' }} />
              <span className="font-mono uppercase tracking-wider"
                style={{ fontSize:10, color:'var(--stone-500)', letterSpacing:'0.08em' }}>
                Meus casos
              </span>
            </div>
            <button onClick={() => setCollapsed(true)} title="Recolher"
              className="p-1 rounded transition-colors duration-200" style={{ color:'var(--stone-400)' }}
              onMouseEnter={e => e.currentTarget.style.color='var(--stone-700)'}
              onMouseLeave={e => e.currentTarget.style.color='var(--stone-400)'}>
              <Icon name="panel-left-close" className="w-[14px] h-[14px]" />
            </button>
          </div>

          {/* New case */}
          <div className="px-4 pb-3">
            <button onClick={onNewCase}
              className="w-full flex items-center justify-center gap-2 py-2 rounded-md text-xs font-medium transition-all duration-200"
              style={{ background:'var(--accent)', color:'var(--stone-50)' }}
              onMouseEnter={e => e.currentTarget.style.filter='brightness(1.1)'}
              onMouseLeave={e => e.currentTarget.style.filter='none'}>
              <Icon name="plus" className="w-3 h-3" />
              Novo caso
            </button>
          </div>

          {/* Search */}
          <div className="px-4 pb-2">
            <div className="flex items-center gap-2 px-2 py-1.5 rounded"
              style={{ background:'var(--stone-50)', border:'1px solid var(--stone-200)' }}>
              <Icon name="search" className="w-3 h-3" style={{ color:'var(--stone-400)' }} />
              <input value={search} onChange={e => setSearch(e.target.value)}
                placeholder="Buscar caso ou área..."
                className="bg-transparent border-0 outline-none text-xs flex-1 min-w-0"
                style={{ color:'var(--stone-900)' }} />
            </div>
          </div>

          {/* Status filter */}
          <div className="px-4 pb-2">
            <select value={filterStatus} onChange={e => setFilterStatus(e.target.value)}
              className="w-full px-2 py-1.5 rounded text-xs"
              style={{ background:'var(--stone-50)', border:'1px solid var(--stone-200)', color:'var(--stone-700)' }}>
              <option value="todos">Todos os estágios</option>
              {Object.entries(STATUS_LABELS).map(([k,v]) => <option key={k} value={k}>{v}</option>)}
            </select>
          </div>

          {/* Archived toggle */}
          <div className="px-4 pb-3">
            <button onClick={() => setShowArchived(!showArchived)}
              className="w-full flex items-center justify-between px-2 py-1.5 rounded text-xs transition-colors duration-200"
              style={{ background: showArchived?'var(--stone-200)':'transparent', color:'var(--stone-500)' }}>
              <span className="flex items-center gap-1.5">
                <Icon name={showArchived?'archive-restore':'archive'} className="w-3 h-3" />
                {showArchived?'Mostrando arquivados':'Ver arquivados'}
              </span>
            </button>
          </div>

          {/* List */}
          <div className="flex-1 overflow-y-auto px-2 pb-3">
            {loading && cases.length === 0 && (
              <div className="px-3 py-4 text-xs text-center" style={{ color:'var(--stone-400)' }}>Carregando...</div>
            )}
            {!loading && visible.length === 0 && (
              <div className="px-3 py-6 text-xs text-center" style={{ color:'var(--stone-400)' }}>
                {showArchived ? 'Nenhum caso arquivado.' : 'Nenhum caso ainda. Clique em "Novo caso".'}
              </div>
            )}
            {visible.map(c => {
              const active = c.caso_id === currentCasoId;
              const isRenaming = renamingId === c.caso_id;
              return (
                <div key={c.caso_id}
                  onClick={() => !isRenaming && onOpen(c.caso_id)}
                  className="group px-3 py-2.5 rounded mb-1 cursor-pointer transition-all duration-150 anim-fade"
                  style={{
                    background: active ? 'var(--accent-dim)' : 'transparent',
                    borderLeft: active ? '2px solid var(--accent)' : '2px solid transparent',
                  }}
                  onMouseEnter={e => { if (!active) e.currentTarget.style.background='var(--stone-200)'; }}
                  onMouseLeave={e => { if (!active) e.currentTarget.style.background='transparent'; }}>
                  <div className="flex items-start justify-between gap-2">
                    <div className="min-w-0 flex-1">
                      {isRenaming ? (
                        <div className="flex items-center gap-1">
                          <input ref={renameInputRef} value={renameValue}
                            onChange={e => setRenameValue(e.target.value)}
                            onKeyDown={e => { if (e.key === 'Enter') confirmRename(); if (e.key === 'Escape') cancelRename(); }}
                            onClick={e => e.stopPropagation()}
                            className="bg-transparent border-0 outline-none text-xs font-medium flex-1 min-w-0 px-1 py-0.5 rounded"
                            style={{ color:'var(--stone-900)', background:'var(--stone-50)', border:'1px solid var(--accent)' }}
                            placeholder="Nome do caso..." />
                          <button onClick={e => { e.stopPropagation(); confirmRename(); }} title="Confirmar"
                            className="p-0.5 rounded" style={{ color:'var(--agent-auditor)' }}>
                            <Icon name="check" className="w-3 h-3" />
                          </button>
                          <button onClick={e => { e.stopPropagation(); cancelRename(); }} title="Cancelar"
                            className="p-0.5 rounded" style={{ color:'var(--stone-400)' }}>
                            <Icon name="x" className="w-3 h-3" />
                          </button>
                        </div>
                      ) : (
                        <div className="text-xs font-medium truncate" style={{ color:'var(--stone-900)' }}>
                          {c.area_direito || c.caso_id}
                        </div>
                      )}
                      <div className="flex items-center gap-1.5 mt-1 font-mono"
                        style={{ fontSize:9, color:'var(--stone-500)' }}>
                        <span>{TIPO_LABELS[c.tipo_peca] || c.tipo_peca}</span>
                        <span>·</span>
                        <span>{STATUS_LABELS[c.status] || c.status}</span>
                      </div>
                      {c.area_direito && (
                        <div className="text-[9px] mt-0.5 truncate font-mono" style={{ color:'var(--stone-400)' }}>
                          {c.caso_id}
                        </div>
                      )}
                      <div className="text-[9px] mt-0.5 font-mono" style={{ color:'var(--stone-400)' }}>
                        {formatRelative(c.updated_at)}
                      </div>
                    </div>
                    {/* Action buttons — shown on hover */}
                    <div className="flex flex-col items-center gap-0.5 opacity-0 group-hover:opacity-100 transition-opacity shrink-0">
                      <button
                        onClick={e => { e.stopPropagation(); handleOpenFolder(c.caso_id); }}
                        title="Abrir pasta do caso"
                        className="p-1 rounded transition-colors"
                        style={{ color:'var(--stone-400)' }}
                        onMouseEnter={e => e.currentTarget.style.color='var(--stone-700)'}
                        onMouseLeave={e => e.currentTarget.style.color='var(--stone-400)'}>
                        <Icon name="folder-open" className="w-3 h-3" />
                      </button>
                      <button
                        onClick={e => { e.stopPropagation(); startRename(c); }}
                        title="Renomear caso"
                        className="p-1 rounded transition-colors"
                        style={{ color:'var(--stone-400)' }}
                        onMouseEnter={e => e.currentTarget.style.color='var(--stone-700)'}
                        onMouseLeave={e => e.currentTarget.style.color='var(--stone-400)'}>
                        <Icon name="pencil" className="w-3 h-3" />
                      </button>
                      <button
                        onClick={e => { e.stopPropagation(); handleArchive(c.caso_id, !c.archived); }}
                        title={c.archived ? 'Restaurar' : 'Arquivar'}
                        className="p-1 rounded transition-colors"
                        style={{ color:'var(--stone-400)' }}
                        onMouseEnter={e => e.currentTarget.style.color='var(--stone-700)'}
                        onMouseLeave={e => e.currentTarget.style.color='var(--stone-400)'}>
                        <Icon name={c.archived ? 'archive-restore' : 'archive'} className="w-3 h-3" />
                      </button>
                      <button
                        onClick={e => { e.stopPropagation(); handleDelete(c.caso_id); }}
                        title="Excluir caso"
                        className="p-1 rounded transition-colors"
                        style={{ color:'var(--stone-400)' }}
                        onMouseEnter={e => e.currentTarget.style.color='var(--agent-contraparte)'}
                        onMouseLeave={e => e.currentTarget.style.color='var(--stone-400)'}>
                        <Icon name="trash-2" className="w-3 h-3" />
                      </button>
                    </div>
                  </div>
                </div>
              );
            })}
          </div>
        </aside>
      );
    };

    /* ══════════ MAIN APP ══════════ */
    /* mode é estritamente derivado de state.status do caso ativo.
       Não há transições locais — o backend é a fonte de verdade. */
    function App() {
      const [theme, setTheme] = useState('dark');
      const [casoId, setCasoId] = useState('');
      const [tipoPeca, setTipoPeca] = useState('peticao_inicial');
      const [activeState, setActiveState] = useState(null);
      const [feedEvents, setFeedEvents] = useState([]);
      const [agentDetail, setAgentDetail] = useState(null);

      // status (backend) → mode da UI
      const statusToMode = (status) => {
        if (!status) return 0;
        if (['intake','gate1'].includes(status)) return 0;
        if (['pesquisa','gate2','redacao','adversarial','revisao_humana','verificacao'].includes(status)) return 1;
        if (['entrega','finalizado'].includes(status)) return 2;
        return 0;
      };
      const mode = !casoId ? -1 : statusToMode(activeState && activeState.status);
      const cost = activeState && typeof activeState.custo_total_usd === 'number' ? activeState.custo_total_usd : 0;

      // Agentes ativos/concluídos derivados do status real (sem heurísticas em eventos)
      const statusToAgentSets = (status) => {
        if (!status || ['intake'].includes(status)) return { active:['intake'], completed:[] };
        if (status === 'gate1') return { active:[], completed:['intake'] };
        if (status === 'pesquisa') return { active:['pesquisador'], completed:['intake'] };
        if (status === 'gate2') return { active:[], completed:['intake','pesquisador'] };
        if (status === 'redacao') return { active:['redator'], completed:['intake','pesquisador'] };
        if (['adversarial','revisao_humana'].includes(status)) return { active:['contraparte'], completed:['intake','pesquisador','redator'] };
        if (status === 'verificacao') return { active:['auditor'], completed:['intake','pesquisador','redator','contraparte'] };
        if (status === 'entrega') return { active:['formatador'], completed:['intake','pesquisador','redator','contraparte','auditor'] };
        if (status === 'finalizado') return { active:[], completed:['intake','pesquisador','redator','contraparte','auditor','formatador'] };
        return { active:[], completed:[] };
      };
      const { active: activeAgents, completed: completedAgents } = statusToAgentSets(activeState && activeState.status);

      const toggleTheme = () => {
        const next = theme === 'dark' ? 'light' : 'dark';
        setTheme(next);
        document.documentElement.setAttribute('data-theme', next);
      };

      const startCase = async (tipo) => {
        const id = `caso_${Date.now()}`;
        setTipoPeca(tipo);
        await api.createCase(id, tipo, '');
        setCasoId(id);
        setActiveState(null);
      };

      const openCase = async (id) => {
        setCasoId(id);
        setActiveState(null);
      };

      const newCase = () => {
        setCasoId('');
        setActiveState(null);
      };

      // Polling único do estado do caso ativo (fonte de verdade para mode/cost/agents)
      useEffect(() => {
        if (!casoId) return;
        let cancelled = false;
        const fetchAll = async () => {
          const data = await api.getPipeline(casoId);
          if (!cancelled && data && data.state) setActiveState(data.state);
          const evts = await api.getEvents(casoId);
          if (!cancelled && evts && Array.isArray(evts.events)) setFeedEvents(evts.events);
        };
        fetchAll();
        const iv = setInterval(fetchAll, 3000);
        return () => { cancelled = true; clearInterval(iv); };
      }, [casoId]);

      return (
        <div className="flex h-screen w-full overflow-hidden" style={{ background:'var(--stone-50)', color:'var(--stone-900)' }}>
          {/* ── LEFT RAIL ── */}
          <div className="w-14 h-full flex flex-col items-center py-5 space-y-5 shrink-0"
            style={{ background:'var(--stone-100)', borderRight:'1px solid var(--stone-200)' }}>
            <div className="w-8 h-8 rounded flex items-center justify-center font-serif font-bold text-sm mb-2"
              style={{ background: theme==='dark'?'var(--stone-900)':'var(--accent)', color:'var(--stone-50)' }}>R</div>
            <div className="relative flex items-center justify-center w-full" title="Escritório">
              <div className="absolute left-0 w-1 h-7 rounded-r" style={{ background:'var(--accent)' }} />
              <Icon name="briefcase" className="w-[18px] h-[18px]" style={{ color:'var(--accent)' }} />
            </div>
            <a href="http://127.0.0.1:5500/" title="Voltar à pesquisa jurisprudencial"
              className="p-1 rounded transition-colors duration-200" style={{ color:'var(--stone-400)' }}
              onMouseEnter={e => e.currentTarget.style.color='var(--stone-700)'}
              onMouseLeave={e => e.currentTarget.style.color='var(--stone-400)'}>
              <Icon name="search" className="w-[18px] h-[18px]" />
            </a>
            <div className="flex-1" />
            <button onClick={toggleTheme} title="Alternar tema"
              className="p-1 rounded transition-colors duration-200" style={{ color:'var(--stone-400)' }}>
              <Icon name={theme==='dark'?'sun':'moon'} className="w-[18px] h-[18px]" />
            </button>
            <button title="Configurações" className="p-1 rounded" style={{ color:'var(--stone-400)' }}>
              <Icon name="settings" className="w-[18px] h-[18px]" />
            </button>
          </div>

          {/* ── CASES SIDEBAR ── */}
          <CasesSidebar
            currentCasoId={casoId}
            onOpen={openCase}
            onNewCase={newCase}
          />

          {/* ── MAIN ── */}
          <div className="flex-1 flex flex-col h-full min-w-0">
            <div className="gold-rule" />

            <header className="ratio-top-header">
              <div className="ratio-top-brand">
                <img className="ratio-top-brand-mark" src="/escritorio/assets/favicon-48x48.png"
                  alt="Ratio" onError={(e) => { e.currentTarget.style.display='none'; }} />
                <p className="ratio-eyebrow">RATIO</p>
                <h1>Escritório</h1>
                {mode >= 0 && <>
                  <div className="ratio-top-brand-divider" />
                  <AgentAvatars activeAgents={activeAgents} completedAgents={completedAgents} onClickAgent={setAgentDetail} />
                </>}
              </div>
              <div className="ratio-top-actions">
                {mode >= 0 && <BurnMeter cost={cost} />}
              </div>
            </header>

            <div className="flex-1 overflow-hidden">
              {mode === -1 && (
                <div className="flex items-center justify-center h-full anim-fade">
                  <div className="max-w-lg w-full text-center space-y-8 px-6">
                    <div>
                      <div className="w-16 h-16 rounded-xl mx-auto flex items-center justify-center mb-5"
                        style={{ background:'var(--accent-dim)', border:'1px solid var(--accent)33' }}>
                        <Icon name="briefcase" className="w-7 h-7" style={{ color:'var(--accent)' }} />
                      </div>
                      <h2 className="font-serif text-3xl font-bold" style={{ color:'var(--stone-900)' }}>Ratio Escritório</h2>
                      <p className="mt-2 text-sm" style={{ color:'var(--stone-500)', maxWidth:380, margin:'8px auto 0' }}>
                        Pipeline multi-agente para redação de peças jurídicas com pesquisa automatizada e revisão adversarial.
                      </p>
                    </div>
                    <div className="flex justify-center space-x-4">
                      <button onClick={() => startCase('peticao_inicial')}
                        className="px-6 py-3 rounded-lg font-semibold text-sm transition-all duration-200"
                        style={{ background:'var(--accent)', color:'var(--stone-50)' }}
                        onMouseEnter={e => e.currentTarget.style.filter='brightness(1.12)'} onMouseLeave={e => e.currentTarget.style.filter='none'}>
                        <Icon name="file-plus" className="w-4 h-4 inline mr-2" style={{ verticalAlign:'-2px' }} />
                        Nova Petição Inicial
                      </button>
                      <button onClick={() => startCase('contestacao')}
                        className="px-6 py-3 rounded-lg font-semibold text-sm transition-all duration-200"
                        style={{ border:'1px solid var(--stone-300)', color:'var(--stone-700)' }}
                        onMouseEnter={e => e.currentTarget.style.borderColor='var(--accent)'} onMouseLeave={e => e.currentTarget.style.borderColor='var(--stone-300)'}>
                        <Icon name="shield" className="w-4 h-4 inline mr-2" style={{ verticalAlign:'-2px' }} />
                        Nova Contestação
                      </button>
                    </div>
                    <div className="pt-4">
                      <div className="flex items-center justify-center space-x-6 font-mono" style={{ fontSize:10, color:'var(--stone-400)' }}>
                        {AGENTS.map(a => (
                          <div key={a.id} className="flex items-center space-x-1.5">
                            <div className="w-2 h-2 rounded-full" style={{ background:a.color }} />
                            <span>{a.name}</span>
                            {!a.llm && <span style={{ fontSize:7, color:'var(--stone-500)', border:'1px solid var(--stone-300)', borderRadius:3, padding:'0 3px' }}>codigo</span>}
                          </div>
                        ))}
                      </div>
                    </div>
                  </div>
                </div>
              )}
              {mode === 0 && <IntakeMode casoId={casoId} onGateApprove={() => { /* mode auto-deriva */ }} />}
              {mode === 1 && <WorkspaceMode casoId={casoId} onFinish={() => { /* mode auto-deriva */ }} feedEvents={feedEvents} />}
              {mode === 2 && <DeliveryMode casoId={casoId} />}
            </div>
          </div>
          {agentDetail && <AgentDetailModal agentId={agentDetail} events={feedEvents} onClose={() => setAgentDetail(null)} />}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);

  </script>
</body>
</html>
